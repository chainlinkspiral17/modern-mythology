<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard → Video Pipeline — One Model Nation</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&family=Space+Mono:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{width:100%;min-height:100%;}
  :root{
    --bg0:#080604; --bg1:#0e0c09; --bg2:#141208; --bg3:#1a1610;
    --border:rgba(180,140,60,0.15); --border2:rgba(180,140,60,0.08);
    --text:#c4baa0; --text2:rgba(196,186,160,0.55); --text3:rgba(196,186,160,0.28);
    --accent:#c8a84a; --accent-bg:rgba(180,140,60,0.08); --accent-border:rgba(180,140,60,0.4);
    --input-bg:rgba(255,255,255,0.04); --input-border:rgba(180,140,60,0.18); --input-focus:rgba(180,140,60,0.5);
    --scrollbar:rgba(180,140,60,0.22); --danger:rgba(200,60,40,0.7); --danger-border:rgba(200,60,40,0.3);
    --ok:#6fae5a; --warn:#d08a3a;
  }
  body.light{
    --bg0:#f8f4ec; --bg1:#f0ebe0; --bg2:#e8e2d4; --bg3:#ddd7c8;
    --border:rgba(100,75,20,0.22); --border2:rgba(100,75,20,0.12);
    --text:#1a1408; --text2:rgba(26,20,8,0.6); --text3:rgba(26,20,8,0.35);
    --accent:#7a5418; --accent-bg:rgba(122,84,24,0.1); --accent-border:rgba(122,84,24,0.45);
    --input-bg:rgba(255,255,255,0.8); --input-border:rgba(100,75,20,0.28); --input-focus:rgba(122,84,24,0.65);
    --scrollbar:rgba(100,75,20,0.18); --ok:#3f7a2a; --warn:#9a5a10;
  }
  body{background:var(--bg0);color:var(--text);font-family:'Courier Prime',monospace;font-size:13px;line-height:1.5;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  h1,h2,h3{font-family:'Cinzel',serif;font-weight:600;color:var(--accent);letter-spacing:0.04em;}
  .mono{font-family:'Space Mono',monospace;}
  .serif{font-family:'IM Fell English',serif;}
  input,textarea,select,button{font-family:'Courier Prime',monospace;color:var(--text);}
  input,textarea,select{background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;padding:5px 8px;font-size:12px;width:100%;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--input-focus);}
  textarea{resize:vertical;line-height:1.4;}
  label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text2);margin:6px 0 2px;font-family:'Space Mono',monospace;}
  button{cursor:pointer;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:4px;padding:5px 10px;font-size:11px;transition:all .12s;}
  button:hover{background:var(--accent);color:var(--bg0);}
  button.ghost{background:transparent;border-color:var(--border);}
  button.danger{border-color:var(--danger-border);color:var(--danger);}
  button.danger:hover{background:var(--danger);color:#fff;}
  .chip{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--text2);}
  .card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px 80px;}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg0),rgba(8,6,4,0.92));backdrop-filter:blur(6px);border-bottom:1px solid var(--border);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pre{white-space:pre-wrap;word-break:break-word;font-family:'Space Mono',monospace;font-size:11px;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;padding:8px 10px;color:var(--text);}
  .frame{aspect-ratio:16/9;background:var(--bg3);border:1px dashed var(--input-border);border-radius:5px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:10px;color:var(--text3);text-align:center;}
  .frame img{width:100%;height:100%;object-fit:cover;}
  a{color:var(--accent);}
  .flex{display:flex;align-items:center;gap:8px;}
  .barfill{height:6px;border-radius:3px;background:var(--accent);transition:width .2s;}
  details summary{cursor:pointer;list-style:none;}
  details summary::-webkit-details-marker{display:none;}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg0);padding:8px 16px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const LS_KEY = 'omn_hangar_pipeline_v1';
const uid = () => Math.random().toString(36).slice(2,9);
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const fmtT = s => { s=Math.max(0,Math.round(s)); const m=Math.floor(s/60), ss=s%60; return `${m}:${String(ss).padStart(2,'0')}`; };

// ── Drive-seeded reference library (from andylink@gmail.com Drive, 2026-06-23 batch) ──
const SEED_REFS = [
  { id:uid(), label:'Character — profile / hair', tag:'character', url:'https://drive.google.com/file/d/1DHDW1kCoK_tuIxc2xJVZSFCKD661rMcG/view' },
  { id:uid(), label:'Character — front (Front-s)', tag:'character', url:'https://drive.google.com/file/d/19B_n7gKdqpgthTGrt27jduL0PwqgUn7k/view' },
  { id:uid(), label:'Style upscale (Whisk)', tag:'look', url:'https://drive.google.com/file/d/1es0HMqlBW1wuY0ie3lOiBBXFcdu6e_aA/view' },
];

// ── Default style bible — alt-1980s hangar concert. Edit freely. ──
const DEFAULT = () => ({
  title: 'One Model Nation — Hangar Concert (4:00)',
  logline: 'Alt-universe 1980s. A massive crowd packed inside a colossal aircraft hangar that opens to an outdoor night; the band performs as the sequence builds to a peak.',
  leadin: 'The preceding 45s ends on: (describe the last frame of your existing footage here — this seeds Shot 1\'s start frame).',
  bible: {
    era: 'alternate-universe 1980s, analog-futurist',
    location: 'colossal aircraft hangar, vast bay doors cracked open to an outdoor night, scaffold stage',
    palette: 'sodium-amber and cold cyan, deep shadow, smoke-diffused beams',
    film: '35mm film grain, halation on highlights, slight gate weave, anamorphic flares',
    lens: 'anamorphic 2x, wide establishing to 50mm performer coverage, shallow DOF',
    mood: 'euphoric, electric, cavernous scale, sweat and haze',
    negative: 'modern phones, modern logos, text, watermark, distorted hands, extra limbs, CGI sheen',
    aspect: '2.39:1',
  },
  settings: { targetSec: 240, clipSec: 8, engine: 'veo' },
  refs: SEED_REFS,
  segments: [],
});

const SHOT_TYPES = ['Establishing wide','Crowd wide','Stage wide','Medium — band','Close — performer','Insert / detail','Crane down','Crane up','Tracking','POV crowd','Overhead','Silhouette'];
const CAMERA_MOVES = ['Slow push in','Slow pull out','Crane up over crowd','Crane down to stage','Lateral dolly left','Lateral dolly right','Orbit around performer','Handheld drift','Whip pan','Static locked-off','Rise to reveal bay doors','Boom down through haze'];

const newSeg = (i) => ({
  id: uid(),
  title: '',
  shotType: SHOT_TYPES[0],
  camera: CAMERA_MOVES[0],
  subject: '',
  action: '',
  lighting: '',
  audio: '',
  notes: '',
  durationSec: null,        // null → inherit project clipSec
  inheritStart: i>0,        // chain: start frame = prev shot's end frame
  startFrame: '',           // url or note
  endFrame: '',             // url of generated last frame
  status: 'idea',           // idea | storyboard | generated | approved
});

const STATUS = {
  idea:       { label:'Idea',       color:'var(--text3)' },
  storyboard: { label:'Storyboard', color:'var(--warn)' },
  generated:  { label:'Generated',  color:'var(--accent)' },
  approved:   { label:'Approved',   color:'var(--ok)' },
};

// ── Prompt compilers ──────────────────────────────────────────────
function styleSuffix(b){
  return [b.era, b.location, b.palette, b.film, b.lens, b.mood].filter(Boolean).join(', ');
}
function compileStill(seg, b){
  const subj = seg.subject || 'the scene';
  const act = seg.action ? `, ${seg.action}` : '';
  const light = seg.lighting ? ` ${seg.lighting}.` : '';
  const neg = b.negative ? ` --no ${b.negative}` : '';
  return `${seg.shotType} of ${subj}${act}.${light} ${styleSuffix(b)}. Cinematic still, ${b.aspect} aspect ratio.${neg}`;
}
function compileVeo(seg, b){
  // Veo (Imagen-to-video): one paragraph, motion + ambience; audio cue on its own line.
  const subj = seg.subject || 'the scene';
  const lines = [];
  lines.push(`${seg.camera}. ${subj}${seg.action?`, ${seg.action}`:''}.`);
  if(seg.lighting) lines.push(`${seg.lighting}.`);
  lines.push(`${b.era}, ${b.palette}, ${b.film}, ${b.mood}.`);
  if(seg.inheritStart) lines.push(`Continue seamlessly from the provided first frame; maintain identical lighting, set, and subject continuity.`);
  if(seg.audio) lines.push(`Audio: ${seg.audio}`);
  return lines.join(' ');
}
function compileRunway(seg, b){
  // Runway Gen-4 image-to-video: describe MOTION + camera only; the start image carries the look.
  const move = seg.camera;
  const act = seg.action || 'subtle ambient motion, drifting haze, flickering stage light';
  return `${move}: ${act}. ${b.mood}. Preserve the framing and look of the input image; ${b.film}.`;
}

function download(name, text, type='text/plain'){
  const blob = new Blob([text], {type});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
}

// ── small components ──
function Field({label, value, onChange, area, rows, ph}){
  return (<div>
    <label>{label}</label>
    {area
      ? <textarea rows={rows||2} value={value||''} placeholder={ph} onChange={e=>onChange(e.target.value)} />
      : <input value={value||''} placeholder={ph} onChange={e=>onChange(e.target.value)} />}
  </div>);
}
function Copy({text, label}){
  const [hit,setHit]=useState(false);
  return <button className="ghost" onClick={()=>{navigator.clipboard.writeText(text); setHit(true); setTimeout(()=>setHit(false),900);}}>{hit?'✓ copied':(label||'Copy')}</button>;
}
function PromptBlock({title, text, hint}){
  return (<div style={{marginTop:8}}>
    <div className="flex" style={{justifyContent:'space-between'}}>
      <span className="chip">{title}</span><Copy text={text} />
    </div>
    {hint && <div style={{fontSize:9,color:'var(--text3)',margin:'3px 0'}}>{hint}</div>}
    <div className="pre" style={{marginTop:4}}>{text}</div>
  </div>);
}
function FrameSlot({label, value, onChange, inherited}){
  return (<div>
    <label>{label}{inherited && <span style={{color:'var(--accent)',textTransform:'none',letterSpacing:0}}> · inherits prev end frame</span>}</label>
    <div className="frame">{value ? <img src={value} alt="" onError={e=>{e.target.style.display='none';}}/> : (inherited?'← last frame of previous shot':'paste image URL below')}</div>
    <input style={{marginTop:4,fontSize:10}} value={value||''} placeholder="https://… (Drive link, generated frame, etc.)" onChange={e=>onChange(e.target.value)} />
  </div>);
}

// ── Segment card ──
function SegmentCard({seg, idx, inSec, durSec, prevEnd, bible, onChange, onDel, onDup, onMove, onChain}){
  const set = (k,v)=>onChange({...seg, [k]:v});
  const st = STATUS[seg.status];
  return (
    <div className="card" style={{padding:12, marginBottom:12}}>
      <div className="flex" style={{justifyContent:'space-between', marginBottom:6}}>
        <div className="flex">
          <span className="mono" style={{color:'var(--accent)',fontWeight:700}}>SHOT {String(idx+1).padStart(2,'0')}</span>
          <span className="chip">{fmtT(inSec)}–{fmtT(inSec+durSec)}</span>
          <span className="chip" style={{borderColor:st.color,color:st.color}}>{st.label}</span>
        </div>
        <div className="flex">
          <button className="ghost" title="Move up" onClick={()=>onMove(-1)}>↑</button>
          <button className="ghost" title="Move down" onClick={()=>onMove(1)}>↓</button>
          <button className="ghost" title="Duplicate" onClick={onDup}>⎘</button>
          <button className="danger" title="Delete" onClick={onDel}>✕</button>
        </div>
      </div>

      <div className="seg-grid">
        <div>
          <Field label="Title / beat" value={seg.title} ph="e.g. Bay doors crack open, light floods crowd" onChange={v=>set('title',v)} />
          <div className="grid2">
            <div><label>Shot type</label><select value={seg.shotType} onChange={e=>set('shotType',e.target.value)}>{SHOT_TYPES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><label>Camera move</label><select value={seg.camera} onChange={e=>set('camera',e.target.value)}>{CAMERA_MOVES.map(s=><option key={s}>{s}</option>)}</select></div>
          </div>
          <Field label="Subject" value={seg.subject} ph="lead singer at mic / sea of raised hands / scaffold rig" onChange={v=>set('subject',v)} />
          <Field label="Action / motion" area value={seg.action} ph="leans into the mic as smoke rolls past; crowd surges forward" onChange={v=>set('action',v)} />
          <div className="grid2">
            <Field label="Lighting note" value={seg.lighting} ph="amber backlight, cyan rim, hard key" onChange={v=>set('lighting',v)} />
            <Field label="Audio (Veo)" value={seg.audio} ph="roaring crowd, synth swell, kick drum" onChange={v=>set('audio',v)} />
          </div>
          <div className="grid3" style={{alignItems:'end'}}>
            <div><label>Duration (s)</label><input type="number" min="2" max="12" value={seg.durationSec??''} placeholder={'def'} onChange={e=>set('durationSec', e.target.value===''?null:clamp(+e.target.value,1,12))} /></div>
            <div><label>Status</label><select value={seg.status} onChange={e=>set('status',e.target.value)}>{Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
            <div><label style={{display:'inline'}}>Chain start</label><div className="flex"><input type="checkbox" style={{width:'auto'}} checked={seg.inheritStart} onChange={e=>set('inheritStart',e.target.checked)} /><span style={{fontSize:10,color:'var(--text2)'}}>from prev</span></div></div>
          </div>
        </div>

        <div>
          <FrameSlot label="Start frame" value={seg.inheritStart? (prevEnd||seg.startFrame) : seg.startFrame} inherited={seg.inheritStart} onChange={v=>set('startFrame',v)} />
          <div style={{height:8}} />
          <FrameSlot label="End frame (export last frame of the clip)" value={seg.endFrame} onChange={v=>set('endFrame',v)} />
          <button className="ghost" style={{marginTop:6,width:'100%'}} disabled={!seg.endFrame} onClick={onChain} title="Push this end frame into the next shot's start frame">→ Send end frame to next shot</button>
        </div>
      </div>

      <details style={{marginTop:10}}>
        <summary className="chip" style={{display:'inline-block'}}>▸ Compiled prompts</summary>
        <PromptBlock title="STILL · Imagen / Whisk / Midjourney" hint="Generate the storyboard frame first; approve the look, then animate." text={compileStill(seg,bible)} />
        <PromptBlock title="VEO · image-to-video (+audio)" hint="Feed the approved start frame as first frame in Flow/Veo. Veo 3 renders audio from the Audio: line." text={compileVeo(seg,bible)} />
        <PromptBlock title="RUNWAY · Gen-4 image-to-video" hint="Upload the start frame as the input image; this text drives motion only." text={compileRunway(seg,bible)} />
        <Field label="Notes / takes / version log" area value={seg.notes} ph="v3 hands fixed; used seed 8842; crowd too sparse, reroll" onChange={v=>set('notes',v)} />
      </details>
    </div>
  );
}

// ── App ──
function App(){
  const [doc,setDoc] = useState(()=>{ try{ const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):DEFAULT(); }catch(e){ return DEFAULT(); } });
  const [light,setLight] = useState(()=>localStorage.getItem('omn_light')==='1');
  const [toast,setToast] = useState('');
  const [showBible,setShowBible] = useState(true);
  const importRef = useRef();

  useEffect(()=>{ localStorage.setItem(LS_KEY, JSON.stringify(doc)); }, [doc]);
  useEffect(()=>{ document.body.classList.toggle('light', light); localStorage.setItem('omn_light', light?'1':'0'); }, [light]);
  const flash = (m)=>{ setToast(m); setTimeout(()=>setToast(''),1400); };

  const set = (patch)=>setDoc(d=>({...d, ...patch}));
  const setBible = (patch)=>setDoc(d=>({...d, bible:{...d.bible, ...patch}}));
  const setSettings = (patch)=>setDoc(d=>({...d, settings:{...d.settings, ...patch}}));

  // segment durations / running time
  const clipSec = doc.settings.clipSec||8;
  const durOf = s => s.durationSec || clipSec;
  let acc=0; const times = doc.segments.map(s=>{ const d=durOf(s); const t=acc; acc+=d; return {inSec:t, durSec:d}; });
  const total = acc;
  const target = doc.settings.targetSec||240;

  const setSeg = (i,ns)=>setDoc(d=>{ const segs=[...d.segments]; segs[i]=ns; return {...d, segments:segs}; });
  const delSeg = (i)=>setDoc(d=>({...d, segments:d.segments.filter((_,k)=>k!==i)}));
  const dupSeg = (i)=>setDoc(d=>{ const segs=[...d.segments]; segs.splice(i+1,0,{...segs[i], id:uid(), endFrame:''}); return {...d, segments:segs}; });
  const moveSeg = (i,dir)=>setDoc(d=>{ const j=i+dir; if(j<0||j>=d.segments.length) return d; const segs=[...d.segments]; [segs[i],segs[j]]=[segs[j],segs[i]]; return {...d, segments:segs}; });
  const addSeg = ()=>setDoc(d=>({...d, segments:[...d.segments, newSeg(d.segments.length)]}));
  const chain = (i)=>setDoc(d=>{ const segs=[...d.segments]; if(segs[i+1]){ segs[i+1]={...segs[i+1], inheritStart:true, startFrame:segs[i].endFrame}; } return {...d, segments:segs}; });

  const autofill = ()=>{
    const need = Math.ceil(target/clipSec);
    setDoc(d=>{
      let segs=[...d.segments];
      if(segs.length<need){ for(let k=segs.length;k<need;k++) segs.push(newSeg(k)); }
      return {...d, segments:segs};
    });
    flash(`Shot list filled to ${need} shots (${fmtT(Math.ceil(target/clipSec)*clipSec)})`);
  };

  // refs
  const addRef = ()=>setDoc(d=>({...d, refs:[...d.refs, {id:uid(), label:'New reference', tag:'look', url:''}]}));
  const setRef = (i,patch)=>setDoc(d=>{ const refs=[...d.refs]; refs[i]={...refs[i],...patch}; return {...d, refs}; });
  const delRef = (i)=>setDoc(d=>({...d, refs:d.refs.filter((_,k)=>k!==i)}));

  // export
  const exportJSON = ()=>{ download(`one-model-nation_pipeline_${Date.now()}.json`, JSON.stringify(doc,null,2), 'application/json'); flash('JSON exported'); };
  const exportMD = ()=>{
    const b=doc.bible; const lines=[];
    lines.push(`# ${doc.title}\n`);
    lines.push(`**Logline:** ${doc.logline}\n`);
    lines.push(`**Lead-in (45s before):** ${doc.leadin}\n`);
    lines.push(`**Target:** ${fmtT(target)} · **Built:** ${fmtT(total)} · **Default clip:** ${clipSec}s · **Aspect:** ${b.aspect}\n`);
    lines.push(`## Style Bible`);
    lines.push(`- Era: ${b.era}\n- Location: ${b.location}\n- Palette: ${b.palette}\n- Film: ${b.film}\n- Lens: ${b.lens}\n- Mood: ${b.mood}\n- Negative: ${b.negative}\n`);
    lines.push(`## References`);
    doc.refs.forEach(r=>lines.push(`- [${r.tag}] ${r.label} — ${r.url||'(no link)'}`));
    lines.push(`\n## Shot List (${doc.segments.length} shots)\n`);
    doc.segments.forEach((s,i)=>{
      const t=times[i];
      lines.push(`### Shot ${String(i+1).padStart(2,'0')} · ${fmtT(t.inSec)}–${fmtT(t.inSec+t.durSec)} (${t.durSec}s) — ${STATUS[s.status].label}`);
      if(s.title) lines.push(`*${s.title}*`);
      lines.push(`- Shot: ${s.shotType} | Camera: ${s.camera}${s.inheritStart?' | chains from prev end frame':''}`);
      lines.push(`\n**STILL**\n\n\`\`\`\n${compileStill(s,b)}\n\`\`\``);
      lines.push(`\n**VEO**\n\n\`\`\`\n${compileVeo(s,b)}\n\`\`\``);
      lines.push(`\n**RUNWAY**\n\n\`\`\`\n${compileRunway(s,b)}\n\`\`\``);
      if(s.startFrame) lines.push(`- start frame: ${s.startFrame}`);
      if(s.endFrame) lines.push(`- end frame: ${s.endFrame}`);
      if(s.notes) lines.push(`- notes: ${s.notes}`);
      lines.push('');
    });
    download(`one-model-nation_shotlist_${Date.now()}.md`, lines.join('\n'), 'text/markdown');
    flash('Markdown shot list exported');
  };
  const doImport = (e)=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); setDoc(d); flash('Project imported'); }catch(err){ flash('Invalid JSON'); } };
    r.readAsText(f); e.target.value='';
  };
  const resetAll = ()=>{ if(confirm('Reset the whole project to the alt-80s hangar template? Your current work will be lost (export first!).')){ setDoc(DEFAULT()); flash('Reset to template'); } };

  const pct = clamp((total/target)*100,0,100);
  const over = total>target;

  return (<div>
    {/* TOP BAR */}
    <div className="topbar">
      <div className="wrap" style={{padding:'10px 18px'}}>
        <div className="flex" style={{justifyContent:'space-between', flexWrap:'wrap', gap:10}}>
          <div>
            <h1 style={{fontSize:18, lineHeight:1.1}}>Storyboard → Video Pipeline</h1>
            <div className="mono" style={{fontSize:9,color:'var(--text2)',letterSpacing:'0.1em'}}>ONE MODEL NATION · alt-80s hangar concert · Google Veo + Runway</div>
          </div>
          <div className="flex" style={{gap:14, flexWrap:'wrap'}}>
            <div style={{textAlign:'right'}}>
              <div className="mono" style={{fontSize:11}}>
                <span style={{color: over?'var(--danger)':'var(--accent)', fontWeight:700}}>{fmtT(total)}</span>
                <span style={{color:'var(--text3)'}}> / {fmtT(target)} built · {doc.segments.length} shots</span>
              </div>
              <div style={{width:200, height:6, background:'var(--bg3)', borderRadius:3, marginTop:3}}>
                <div className="barfill" style={{width:pct+'%', background: over?'var(--danger)':'var(--accent)'}} />
              </div>
            </div>
            <button className="ghost" onClick={()=>setLight(l=>!l)}>{light?'◐ dark':'◑ light'}</button>
          </div>
        </div>
      </div>
    </div>

    <div className="wrap" style={{paddingTop:16}}>
      {/* PROJECT + BIBLE */}
      <div className="card" style={{padding:14, marginBottom:16}}>
        <div className="flex" style={{justifyContent:'space-between'}}>
          <h2 style={{fontSize:14}}>Project & Style Bible</h2>
          <button className="ghost" onClick={()=>setShowBible(s=>!s)}>{showBible?'▾ hide':'▸ show'}</button>
        </div>
        {showBible && <div style={{marginTop:8}}>
          <Field label="Project title" value={doc.title} onChange={v=>set({title:v})} />
          <Field label="Logline" area value={doc.logline} onChange={v=>set({logline:v})} />
          <Field label="Lead-in — last frame of your existing 45s (seeds Shot 01 start frame)" area value={doc.leadin} onChange={v=>set({leadin:v})} />
          <div className="grid2" style={{marginTop:6}}>
            <Field label="Era" value={doc.bible.era} onChange={v=>setBible({era:v})} />
            <Field label="Location" value={doc.bible.location} onChange={v=>setBible({location:v})} />
            <Field label="Palette" value={doc.bible.palette} onChange={v=>setBible({palette:v})} />
            <Field label="Film / texture" value={doc.bible.film} onChange={v=>setBible({film:v})} />
            <Field label="Lens language" value={doc.bible.lens} onChange={v=>setBible({lens:v})} />
            <Field label="Mood" value={doc.bible.mood} onChange={v=>setBible({mood:v})} />
            <Field label="Negative prompt" value={doc.bible.negative} onChange={v=>setBible({negative:v})} />
            <Field label="Aspect ratio" value={doc.bible.aspect} onChange={v=>setBible({aspect:v})} />
          </div>

          {/* settings */}
          <div className="grid3" style={{marginTop:10, alignItems:'end'}}>
            <div><label>Target length (sec)</label><input type="number" value={target} onChange={e=>setSettings({targetSec:clamp(+e.target.value||0,1,3600)})} /></div>
            <div><label>Default clip (sec)</label><input type="number" value={clipSec} onChange={e=>setSettings({clipSec:clamp(+e.target.value||8,1,12)})} /></div>
            <div className="flex" style={{gap:6}}>
              <button onClick={autofill}>↻ Fill shot list to target</button>
            </div>
          </div>

          {/* references */}
          <div style={{marginTop:14}}>
            <div className="flex" style={{justifyContent:'space-between'}}>
              <label style={{margin:0}}>Reference library (feed as image inputs to Veo/Runway)</label>
              <button className="ghost" onClick={addRef}>+ ref</button>
            </div>
            <div className="grid2" style={{marginTop:6}}>
              {doc.refs.map((r,i)=>(
                <div key={r.id} className="card" style={{padding:8}}>
                  <div className="flex" style={{gap:6}}>
                    <input style={{flex:2}} value={r.label} onChange={e=>setRef(i,{label:e.target.value})} />
                    <select style={{flex:1}} value={r.tag} onChange={e=>setRef(i,{tag:e.target.value})}>
                      {['character','location','look','prop','lighting'].map(t=><option key={t}>{t}</option>)}
                    </select>
                    <button className="danger" onClick={()=>delRef(i)}>✕</button>
                  </div>
                  <input style={{marginTop:5,fontSize:10}} value={r.url} placeholder="Drive / image URL" onChange={e=>setRef(i,{url:e.target.value})} />
                  {r.url && <a href={r.url} target="_blank" style={{fontSize:10}}>open ↗</a>}
                </div>
              ))}
            </div>
          </div>

          <div className="flex" style={{marginTop:14, flexWrap:'wrap', gap:8}}>
            <button onClick={exportMD}>⤓ Export shot list (.md)</button>
            <button onClick={exportJSON}>⤓ Export project (.json)</button>
            <button className="ghost" onClick={()=>importRef.current.click()}>⤒ Import .json</button>
            <input ref={importRef} type="file" accept="application/json" style={{display:'none'}} onChange={doImport} />
            <button className="danger ghost" onClick={resetAll} style={{marginLeft:'auto'}}>reset to template</button>
          </div>
        </div>}
      </div>

      {/* SHOT LIST */}
      <div className="flex" style={{justifyContent:'space-between', marginBottom:10}}>
        <h2 style={{fontSize:14}}>Shot list · continuity chain</h2>
        <button onClick={addSeg}>+ add shot</button>
      </div>

      {doc.segments.length===0 && (
        <div className="card" style={{padding:30, textAlign:'center', color:'var(--text2)'}}>
          No shots yet. Set your target & clip length above, then <button onClick={autofill} style={{margin:'0 4px'}}>Fill shot list to target</button>
          to scaffold {Math.ceil(target/clipSec)} chained {clipSec}s shots covering {fmtT(target)}.
        </div>
      )}

      {doc.segments.map((s,i)=>(
        <SegmentCard key={s.id} seg={s} idx={i}
          inSec={times[i].inSec} durSec={times[i].durSec}
          prevEnd={i>0?doc.segments[i-1].endFrame:doc.leadin}
          bible={doc.bible}
          onChange={ns=>setSeg(i,ns)} onDel={()=>delSeg(i)} onDup={()=>dupSeg(i)}
          onMove={dir=>moveSeg(i,dir)} onChain={()=>chain(i)} />
      ))}

      {doc.segments.length>0 && <div className="flex" style={{justifyContent:'center', marginTop:6}}><button onClick={addSeg}>+ add shot</button></div>}

      <div className="card" style={{padding:12, marginTop:20, color:'var(--text2)', fontSize:11}}>
        <strong style={{color:'var(--accent)'}}>Workflow</strong> — 1) Fill the style bible & confirm Shot 01's start frame matches the last frame of your 45s lead-in. 2) Generate each <em>STILL</em> first (Imagen/Whisk) and approve the look. 3) Animate the approved still with <em>VEO</em> or <em>RUNWAY</em> (image-to-video). 4) Export the clip's <em>last frame</em>, paste it into <em>End frame</em>, hit <em>→ Send end frame to next shot</em>. The next shot inherits it as its start frame — that hand-off is what keeps all 4 minutes continuous. Everything autosaves to this browser.
      </div>
    </div>

    {toast && <div className="toast">{toast}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
