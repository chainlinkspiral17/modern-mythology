<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene Editor — Modern Mythology</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&family=Space+Mono:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<!-- Canonical chapter data (DEMO_SCENES) — same source the game reads -->
<script src="vn-scenes.jsx"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{width:100%;height:100%;overflow:hidden;}
  html,body,#root{background:var(--bg0);}
  html.light,body.light{background:var(--bg0) !important;}

  /* ── Theme tokens ─────────────────────────────────────────────── */
  :root {
    /* Dark (default) */
    --bg0:       #080604;
    --bg1:       #0e0c09;
    --bg2:       #141208;
    --bg3:       #1a1610;
    --border:    rgba(180,140,60,0.15);
    --border2:   rgba(180,140,60,0.08);
    --text:      #c4baa0;
    --text2:     rgba(196,186,160,0.55);
    --text3:     rgba(196,186,160,0.28);
    --accent:    #c8a84a;
    --accent-bg: rgba(180,140,60,0.08);
    --accent-border: rgba(180,140,60,0.4);
    --input-bg:  rgba(255,255,255,0.04);
    --input-border: rgba(180,140,60,0.18);
    --input-focus: rgba(180,140,60,0.5);
    --scrollbar: rgba(180,140,60,0.22);
    --danger:    rgba(200,60,40,0.6);
    --danger-border: rgba(200,60,40,0.3);
    --node-sel-alpha: 1;
    --sb-opt:    #12100c;
  }
  body.light {
    --bg0:       #f8f4ec;
    --bg1:       #f0ebe0;
    --bg2:       #e8e2d4;
    --bg3:       #ddd7c8;
    --border:    rgba(100,75,20,0.22);
    --border2:   rgba(100,75,20,0.12);
    --text:      #1a1408;
    --text2:     rgba(26,20,8,0.6);
    --text3:     rgba(26,20,8,0.35);
    --accent:    #7a5418;
    --accent-bg: rgba(122,84,24,0.1);
    --accent-border: rgba(122,84,24,0.45);
    --input-bg:  rgba(255,255,255,0.8);
    --input-border: rgba(100,75,20,0.28);
    --input-focus: rgba(122,84,24,0.65);
    --scrollbar: rgba(100,75,20,0.18);
    --danger:    rgba(160,30,10,0.8);
    --danger-border: rgba(160,30,10,0.4);
    --sb-opt:    #f0ebe0;
  }

  body{color:var(--text);font-family:'Space Mono',monospace;}
  html,body{transition:background 0.2s,color 0.2s;}

  /* Scrollbars */
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px;}

  /* Inputs */
  input,textarea,select{
    background:var(--input-bg);border:1px solid var(--input-border);
    color:var(--text);font-family:'Courier Prime',monospace;font-size:13px;
    padding:6px 10px;outline:none;resize:vertical;
    transition:border-color 0.15s,background 0.2s;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--input-focus);}
  input[type=number]{width:72px;}
  select option{background:var(--sb-opt);}
  textarea{line-height:1.6;}

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 12px;border:1px solid var(--border);
    background:var(--accent-bg);color:var(--text2);
    font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.15em;
    text-transform:uppercase;cursor:pointer;transition:all 0.15s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg);}
  .btn.accent{border-color:var(--accent-border);color:var(--accent);}
  .btn.danger{border-color:var(--danger-border);color:var(--danger);}
  .btn.danger:hover{border-color:var(--danger);opacity:0.9;}
  .btn.small{padding:3px 8px;font-size:8px;}
  .btn.sm{padding:3px 8px;font-size:8px;}
  .btn.icon{padding:4px 7px;border:none;background:transparent;color:var(--text3);font-size:13px;}
  .btn.icon:hover{color:var(--accent);background:transparent;border:none;}

  /* Section labels */
  .section-label{
    font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.28em;
    color:var(--text3);text-transform:uppercase;
    filter: brightness(1.3);
  }
  body.light .section-label{filter:none;}

  /* Toggle group */
  .toggle-group{display:flex;gap:4px;}
  .toggle-btn{
    padding:4px 10px;border:1px solid var(--border);
    background:transparent;color:var(--text3);
    font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;
    text-transform:uppercase;cursor:pointer;transition:all 0.15s;
  }
  .toggle-btn.active{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent);}

  /* ── Light mode node row overrides ───────────────────────────── */
  body.light .script-area { background: #faf7f0; }
  body.light input, body.light textarea, body.light select {
    color: #1a1408;
  }

  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Constants ──────────────────────────────────────────────────────────────
const NODE_TYPES = [
  { t:'narrate',  label:'Narration',  color:'var(--accent)', bg:'rgba(200,168,74,0.08)',  icon:'¶'  },
  { t:'say',      label:'Dialogue',   color:'#7ab8e8', bg:'rgba(122,184,232,0.07)', icon:'❝'  },
  { t:'think',    label:'Thought',    color:'#b8a4d8', bg:'rgba(184,164,216,0.07)', icon:'~'  },
  { t:'choice',   label:'Choice',     color:'#e8a040', bg:'rgba(232,160,64,0.08)',  icon:'◆'  },
  { t:'show',     label:'Show Char',  color:'#80c864', bg:'rgba(128,200,100,0.07)', icon:'▲'  },
  { t:'hide',     label:'Hide Char',  color:'#60a848', bg:'rgba(96,168,72,0.06)',   icon:'▼'  },
  { t:'bg',       label:'Background', color:'#8898b8', bg:'rgba(136,152,184,0.06)', icon:'⬛' },
  { t:'bgm',      label:'Music',      color:'#88a8c8', bg:'rgba(136,168,200,0.06)', icon:'♪'  },
  { t:'sfx',      label:'Sound FX',   color:'#78a0b8', bg:'rgba(120,160,184,0.06)', icon:'♫'  },
  { t:'flag',     label:'Set Flag',   color:'#d07878', bg:'rgba(208,120,120,0.07)', icon:'⚑'  },
  { t:'jump',     label:'Jump',       color:'#60c8c8', bg:'rgba(96,200,200,0.07)',  icon:'→'  },
  { t:'end',       label:'End Scene',  color:'#e05050', bg:'rgba(224,80,80,0.08)',   icon:'■'  },
  { t:'videoscene',label:'Video Scene',color:'#e878f0', bg:'rgba(232,120,240,0.07)', icon:'▶'  },
  { t:'interlude', label:'Interlude',  color:'#f0c860', bg:'rgba(240,200,96,0.07)',  icon:'✦'  },
  { t:'cg',        label:'CG Image',   color:'#80d0a0', bg:'rgba(128,208,160,0.07)', icon:'✧'  },
  { t:'gallery',   label:'Open Gallery',color:'#a0b8e0',bg:'rgba(160,184,224,0.07)', icon:'⬚'  },
];
const typeMap = Object.fromEntries(NODE_TYPES.map(x => [x.t, x]));

const DEFAULT_NODES = {
  narrate: { t:'narrate', text:'' },
  say:     { t:'say', char:'', expr:'neutral', pos:'center', role:'', text:'' },
  think:   { t:'think', char:'', text:'' },
  choice:  { t:'choice', prompt:'', opts:[{ text:'', goto:1 }] },
  show:    { t:'show', char:'', expr:'neutral', pos:'center' },
  hide:    { t:'hide', pos:'center' },
  bg:      { t:'bg', src:'' },
  bgm:     { t:'bgm', src:'' },
  sfx:     { t:'sfx', src:'' },
  flag:    { t:'flag', key:'', val:true },
  jump:       { t:'jump', scene:'' },
  end:        { t:'end' },
  videoscene: { t:'videoscene', src:'', loop:true, bgFallback:'', hotspots:[] },
  interlude:  { t:'interlude', text:'', sub:'', duration:4000 },
  cg:         { t:'cg', src:'', caption:'' },
  gallery:    { t:'gallery', tab:'stills', item:'', newTab:true },
};

const EXPRESSIONS = ['neutral','happy','sad','angry','surprised','worried','cold','warm','amused','calculating','impressed','thoughtful','hurt','softening','tired','excited','confused'];
const POSITIONS = ['left','center','right'];

const VOLS = [
  { vol:1,  title:'Modern Mythology',        skin:'literary'  },
  { vol:2,  title:'Small Wood Volumes',       skin:'literary'  },
  { vol:3,  title:'The Earthman Chronicles',  skin:'signal'    },
  { vol:4,  title:'#/Sharp',                  skin:'zine'      },
  { vol:5,  title:'Major Arcana',             skin:'arcana'    },
  { vol:6,  title:'Planned Community',        skin:'suburban'  },
  { vol:7,  title:'Land of Milk & Honey',     skin:'pastoral'  },
  { vol:8,  title:'SCUMM',                    skin:'scumm'     },
  { vol:9,  title:'Por Puesto',               skin:'caliente'  },
  { vol:10, title:'ROFLcopter',               skin:'glitch'    },
];

const SAVE_KEY = 'mm_editor_scenes';
const CHARS_KEY = 'mm_editor_chars';
const EDITED_KEY = 'mm_editor_edited_scenes';

function loadData() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch { return null; }
}
function loadEditedSet() {
  try { return new Set(JSON.parse(localStorage.getItem(EDITED_KEY) || '[]')); }
  catch { return new Set(); }
}
// Only the scenes the user has actually edited are written back. Everything
// else stays sourced from vn-scenes.jsx so that future source-code changes to
// chapter content aren't shadowed by a stale localStorage copy.
function persistEditorState(data, editedSet) {
  try {
    const out = {};
    Object.entries(data).forEach(([vol, vd]) => {
      const scenes = {};
      Object.entries(vd.scenes || {}).forEach(([id, sc]) => {
        if (!editedSet.has(id)) return;
        const clean = { ...sc };
        delete clean.__canonical;
        delete clean.__edited;
        scenes[id] = clean;
      });
      if (Object.keys(scenes).length) out[vol] = { scenes };
    });
    localStorage.setItem(SAVE_KEY, JSON.stringify(out));
    localStorage.setItem(EDITED_KEY, JSON.stringify([...editedSet]));
  } catch {}
}
function loadChars() {
  try { return JSON.parse(localStorage.getItem(CHARS_KEY) || 'null') || ['stranger','ruth','jo','oracle','casper','deja']; } catch { return ['stranger','ruth','jo','oracle','casper','deja']; }
}
function saveChars(c) { try { localStorage.setItem(CHARS_KEY, JSON.stringify(c)); } catch {} }

// ── Canonical chapter data: pulled from window.DEMO_SCENES (vn-scenes.jsx) ──
// vn-scenes.jsx is the single source of truth for the chapter layout. The
// editor groups its flat scene map by volume into the tree shape the rest of
// this file expects. User edits are overlaid on top from localStorage.
//
// Many scenes in vn-scenes.jsx (especially stub chapters and entry points)
// carry only `id` + `nodes`. We infer chapter/type/title from the id pattern
// `vol{N}_ch{M}_*` / `vol{N}_int_*` so the editor's grouped view stays usable.
function inferSceneMeta(id) {
  // Recognized patterns:
  //   vol{N}_ch{M}_*  → chapter M
  //   vol{N}_int_*    → interlude (chapter 0)
  //   vol{N}_*        → fallback, chapter unknown
  const chMatch = id.match(/^vol(\d+)_ch(\d+)_(.*)$/);
  if (chMatch) {
    const [, , chNum, rest] = chMatch;
    const slug = humanize(rest);
    return { type: 'chapter', chapter: parseInt(chNum, 10), title: `Ch ${parseInt(chNum,10)} — ${slug}` };
  }
  const intMatch = id.match(/^vol(\d+)_int_(.*)$/);
  if (intMatch) {
    const slug = humanize(intMatch[2]);
    return { type: 'interlude', chapter: 0, title: `Interlude — ${slug}` };
  }
  const volMatch = id.match(/^vol(\d+)_(.*)$/);
  if (volMatch) {
    return { type: 'chapter', title: humanize(volMatch[2]) };
  }
  return {};
}

function humanize(slug) {
  return (slug || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function buildCanonicalData() {
  const out = {};
  for (let v = 1; v <= 10; v++) out[v] = { scenes: {} };
  const D = (typeof window !== 'undefined' && window.DEMO_SCENES) || {};
  Object.entries(D).forEach(([key, scene]) => {
    if (!scene || typeof scene !== 'object' || !Array.isArray(scene.nodes)) return;
    let vol = scene.vol;
    const id = scene.id || key;
    if (vol == null) {
      const m = id.match(/vol(\d+)/);
      if (m) vol = parseInt(m[1]);
      else if (/^\d+$/.test(key)) vol = parseInt(key);
    }
    if (!vol || vol < 1 || vol > 10) return;
    const inferred = inferSceneMeta(id);
    // Try to extract a better title from the first narrate node if it looks
    // like "— Chapter N · The Title —" (the stub-chapter convention).
    let narrateTitle;
    if (!scene.title) {
      const firstNarrate = scene.nodes.find(n => n.t === 'narrate' && n.text);
      const m = firstNarrate && firstNarrate.text.match(/—\s*Chapter\s+\d+\s*[·•]\s*([^—\[]+?)\s*[—\[]/i);
      if (m) narrateTitle = `Ch ${inferred.chapter ?? '?'} — ${m[1].trim()}`;
    }
    out[vol].scenes[id] = {
      ...scene,
      id,
      vol,
      chapter: scene.chapter ?? inferred.chapter ?? 0,
      type: scene.type || inferred.type || 'chapter',
      title: scene.title || narrateTitle || inferred.title || id,
      __canonical: true,
    };
  });
  return out;
}

function initData() {
  // Start from the canonical chapter layout (vn-scenes.jsx → window.DEMO_SCENES)
  const canonical = buildCanonicalData();
  const saved = loadData();
  if (!saved) return canonical;
  // Overlay user-edited scenes. Edits win over canonical; user-authored scenes
  // get added. New chapters added to vn-scenes.jsx since the last save appear
  // automatically because they come from the canonical seed.
  //
  // Legacy migration: the previous editor auto-saved ALL of its hardcoded
  // stubs to localStorage. Drop any saved scene that is (a) empty AND (b) not
  // present in canonical AND (c) not explicitly tracked in the edited set.
  // These are vestigial test data, not real user edits.
  const editedSet = loadEditedSet();
  const out = { ...canonical };
  Object.entries(saved).forEach(([vol, vd]) => {
    if (!out[vol]) out[vol] = { scenes: {} };
    const merged = { ...out[vol].scenes };
    Object.entries(vd.scenes || {}).forEach(([id, sc]) => {
      const inCanonical = !!canonical[vol]?.scenes?.[id];
      const isEmpty = !sc.nodes || sc.nodes.length === 0;
      const wasEdited = editedSet.has(id);
      // Skip legacy empty stubs that aren't in canonical and weren't explicitly edited
      if (isEmpty && !inCanonical && !wasEdited) return;
      merged[id] = { ...sc, __edited: true };
    });
    out[vol] = { ...out[vol], scenes: merged };
  });
  return out;
}

// ── Node preview (screenplay line) ────────────────────────────────────────
function nodePreview(node) {
  switch(node.t) {
    case 'narrate': return node.text?.slice(0,80) || '(empty narration)';
    case 'say':     return node.text?.slice(0,70) || '(empty dialogue)';
    case 'think':   return node.text?.slice(0,70) || '(empty thought)';
    case 'choice':  return `${node.opts?.length || 0} option${node.opts?.length!==1?'s':''}`;
    case 'show':    return `${node.char||'?'} · ${node.expr||'neutral'} · ${node.pos||'center'}`;
    case 'hide':    return `hide ${node.pos||'all'}`;
    case 'bg':      return node.src || '(no file)';
    case 'bgm':     return node.src || '(no file)';
    case 'sfx':     return node.src || '(no file)';
    case 'flag':    return `${node.key||'?'} = ${JSON.stringify(node.val)}`;
    case 'jump':       return `→ ${node.scene||'?'}`;
    case 'end':        return 'End of scene';
    case 'interlude':  return node.text?.slice(0,70) || '(empty interlude)';
    case 'cg':         return node.src?.split('/').pop() || '(no file)';
    case 'gallery':    return `Open gallery · ${node.tab||'stills'}${node.item?' · '+node.item:''}`;
    default:           return '';
  }
}

// ── NodeRow ────────────────────────────────────────────────────────────────
function NodeRow({ node, idx, selected, onSelect, onDelete, onMove, totalNodes, onDuplicate }) {
  const nt = typeMap[node.t] || NODE_TYPES[0];
  const [hovered, setHovered] = useState(false);

  const rowStyle = {
    display:'flex',alignItems:'stretch',
    borderLeft:`3px solid ${selected ? nt.color : hovered ? nt.color+'80' : 'var(--border2)'}`,
    background: selected ? nt.bg : hovered ? 'rgba(128,128,128,0.04)' : 'transparent',
    cursor:'pointer',transition:'all 0.12s',marginBottom:2,
    outline: selected ? `1px solid ${nt.color}30` : 'none',
  };

  const isSay = node.t === 'say';
  const isNarrate = node.t === 'narrate';
  const isThink = node.t === 'think';

  return (
    <div style={rowStyle} onClick={() => onSelect(idx)}
      onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}>
      {/* Index */}
      <div style={{width:36,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
        fontFamily:'Space Mono',fontSize:9,color:'var(--text3)',userSelect:'none'}}>
        {idx}
      </div>
      {/* Type badge */}
      <div style={{width:24,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
        fontSize:11,color:nt.color,opacity:0.8}}>
        {nt.icon}
      </div>
      {/* Content */}
      <div style={{flex:1,padding:'8px 10px 8px 4px',minWidth:0}}>
        {isSay && node.char && (
          <div style={{fontFamily:'Cinzel,serif',fontSize:9,letterSpacing:'0.18em',color:nt.color,textTransform:'uppercase',marginBottom:3}}>
            {node.char}{node.expr && node.expr!=='neutral' ? ` (${node.expr})` : ''}{node.pos && node.pos!=='center' ? ` · ${node.pos}` : ''}
          </div>
        )}
        <div style={{
          fontFamily: isSay||isNarrate ? "'Courier Prime',monospace" : 'Space Mono,monospace',
          fontSize: isSay||isNarrate ? 13 : 11,
          color: isNarrate ? 'var(--text2)' : isThink ? 'rgba(160,130,220,0.8)' : 'var(--text)',
          fontStyle: isNarrate||isThink ? 'italic' : 'normal',
          lineHeight:1.5, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
        }}>
          {isThink && '( '}
          {nodePreview(node)}
          {isThink && ' )'}
        </div>
        {node.t === 'choice' && node.opts?.slice(0,2).map((o,i) => (
          <div key={i} style={{fontFamily:'Space Mono',fontSize:10,color:'rgba(232,160,64,0.6)',marginTop:2}}>
            {String.fromCharCode(65+i)} → {o.text?.slice(0,40)||'(empty)'}
          </div>
        ))}
      </div>
      {/* Actions (hover) */}
      {(hovered || selected) && (
        <div style={{display:'flex',alignItems:'center',gap:2,paddingRight:6,flexShrink:0}}>
          <button className="btn icon" title="Move up" onClick={e=>{e.stopPropagation();onMove(idx,-1);}} disabled={idx===0}>↑</button>
          <button className="btn icon" title="Move down" onClick={e=>{e.stopPropagation();onMove(idx,1);}} disabled={idx===totalNodes-1}>↓</button>
          <button className="btn icon" title="Duplicate" onClick={e=>{e.stopPropagation();onDuplicate(idx);}}>⎘</button>
          <button className="btn icon danger" title="Delete" onClick={e=>{e.stopPropagation();onDelete(idx);}}>✕</button>
        </div>
      )}
    </div>
  );
}

// ── Choice Option Editor ──────────────────────────────────────────────────
function ChoiceOptEditor({ opt, idx, onChange, onDelete, sceneIds }) {
  const [showCheck, setShowCheck] = useState(!!opt.check);
  return (
    <div style={{border:'1px solid var(--border)',padding:'10px 12px',marginBottom:8,background:'rgba(0,0,0,0.2)'}}>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
        <span style={{fontFamily:'Cinzel,serif',fontSize:9,color:'rgba(232,160,64,0.7)',letterSpacing:'0.15em',minWidth:18}}>{String.fromCharCode(65+idx)}</span>
        <input value={opt.text||''} onChange={e=>onChange({...opt,text:e.target.value})}
          placeholder="Choice text…" style={{flex:1}} />
        <button className="btn icon danger" onClick={onDelete}>✕</button>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontFamily:'Space Mono',fontSize:9,color:'var(--text2)'}}>→</span>
        <label style={{fontSize:9,color:'var(--text2)'}}>Node</label>
        <input type="number" value={opt.goto??''} placeholder="idx"
          onChange={e=>onChange({...opt,goto:e.target.value===''?undefined:parseInt(e.target.value)})} />
        <span style={{fontSize:9,color:'var(--text3)'}}>or</span>
        <label style={{fontSize:9,color:'var(--text2)'}}>Scene</label>
        <input value={opt.scene||''} placeholder="scene_id"
          onChange={e=>onChange({...opt,scene:e.target.value||undefined})}
          style={{width:120}} list="scene-ids-list" />
        <button className="btn small" style={{marginLeft:'auto',color:showCheck?'#c8a84a':'rgba(196,186,160,0.4)'}}
          onClick={()=>setShowCheck(v=>!v)}>
          {showCheck?'- Skill check':'+ Skill check'}
        </button>
      </div>

// ── Import/Export Modal ───────────────────────────────────────────────────
function ImportExportModal({ scene, onImport, onClose }) {
  const [json, setJson] = useState(JSON.stringify(scene, null, 2));
  const [copied, setCopied] = useState(false);

  const doCopy = () => {
    navigator.clipboard.writeText(json).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),1500); });
  };
  const doImport = () => {
    try {
      const parsed = JSON.parse(json);
      if (Array.isArray(parsed)) { onImport(parsed); onClose(); }
      else if (parsed.nodes) { onImport(parsed.nodes); onClose(); }
      else alert('Expected an array of nodes or a scene object with .nodes');
    } catch(e) { alert('Invalid JSON: ' + e.message); }
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:640,height:520,background:'var(--bg1)',border:'1px solid var(--accent-border)',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <span className="section-label">Import / Export JSON</span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn" onClick={doCopy}>{copied?'✓ Copied!':'Copy to clipboard'}</button>
            <button className="btn accent" onClick={doImport}>Import as nodes</button>
            <button className="btn" onClick={onClose}>Close</button>
          </div>
        </div>
        <textarea value={json} onChange={e=>setJson(e.target.value)}
          style={{flex:1,width:'100%',fontFamily:'Space Mono',fontSize:11,padding:16,border:'none',borderRadius:0,resize:'none',background:'var(--bg0)',color:'var(--text)',lineHeight:1.6}} />
        <div style={{padding:'8px 16px',borderTop:'1px solid var(--border2)',fontFamily:'Space Mono',fontSize:9,color:'var(--text3)'}}>
          Paste nodes array here to import · Export and add to DEMO_SCENES in vn-scenes.jsx
        </div>
      </div>
    </div>
  );
}

// ── Scene Graph View ──────────────────────────────────────────────────────
function SceneGraph({ scenes, currentSceneId, onNavigate }) {
  const list = Object.values(scenes);
  if (list.length === 0) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',fontFamily:'Space Mono',fontSize:11,color:'var(--text3)'}}>No scenes yet.</div>
  );
  const BOX_W=180, BOX_H=64, GAP_X=80, GAP_Y=36;
  const COLS = Math.max(1, Math.ceil(Math.sqrt(list.length)));
  const pos = {};
  list.forEach((s,i)=>{ pos[s.id]={x:(i%COLS)*(BOX_W+GAP_X)+24, y:Math.floor(i/COLS)*(BOX_H+GAP_Y)+24}; });
  const edges=[];
  list.forEach(s=>{
    (s.nodes||[]).forEach(n=>{
      if(n.t==='jump'&&n.scene&&pos[n.scene]) edges.push({from:s.id,to:n.scene,type:'jump'});
      if(n.t==='choice')(n.opts||[]).forEach(o=>{ if(o.scene&&pos[o.scene]) edges.push({from:s.id,to:o.scene,type:'choice'}); });
    });
  });
  const totalW=COLS*(BOX_W+GAP_X)+24;
  const totalH=Math.ceil(list.length/COLS)*(BOX_H+GAP_Y)+24;
  return (
    <div style={{overflow:'auto',width:'100%',height:'100%',padding:24,background:'var(--bg0)'}}>
      <svg width={totalW} height={totalH} style={{overflow:'visible',display:'block'}}>
        <defs>
          <marker id="arrowJ" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="rgba(96,200,200,0.6)" />
          </marker>
          <marker id="arrowC" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="rgba(232,160,64,0.6)" />
          </marker>
        </defs>
        {edges.map((e,i)=>{
          const f=pos[e.from], t=pos[e.to]; if(!f||!t) return null;
          const x1=f.x+BOX_W, y1=f.y+BOX_H/2, x2=t.x, y2=t.y+BOX_H/2, mx=(x1+x2)/2;
          const col=e.type==='choice'?'rgba(232,160,64,0.45)':'rgba(96,200,200,0.45)';
          const marker=e.type==='choice'?'url(#arrowC)':'url(#arrowJ)';
          return <path key={i} d={`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`}
            fill="none" stroke={col} strokeWidth={1.5} markerEnd={marker}
            strokeDasharray={e.type==='choice'?'5,3':'none'} />;
        })}
        {list.map(s=>{
          const p=pos[s.id]; const sel=s.id===currentSceneId;
          const hasV=(s.nodes||[]).some(n=>n.t==='videoscene');
          const hasCh=(s.nodes||[]).some(n=>n.t==='choice');
          const hasJmp=(s.nodes||[]).some(n=>n.t==='jump');
          return (
            <g key={s.id} onClick={()=>onNavigate(s.id)} style={{cursor:'pointer'}}>
              <rect x={p.x} y={p.y} width={BOX_W} height={BOX_H} rx={2}
                fill={sel?'rgba(180,140,60,0.1)':'rgba(0,0,0,0.4)'}
                stroke={sel?'rgba(180,140,60,0.6)':'rgba(180,140,60,0.12)'}
                strokeWidth={sel?1.5:1} />
              <text x={p.x+10} y={p.y+22} fontFamily="'IM Fell English',serif" fontSize={13}
                fill={sel?'#d4c9b0':'rgba(196,186,160,0.7)'} fontStyle="italic"
                style={{pointerEvents:'none'}}>{(s.title||s.id).slice(0,22)}</text>
              <text x={p.x+10} y={p.y+37} fontFamily="Space Mono,monospace" fontSize={8}
                fill="rgba(196,186,160,0.3)" style={{pointerEvents:'none'}}>{s.id.slice(0,28)}</text>
              <text x={p.x+10} y={p.y+52} fontFamily="Space Mono,monospace" fontSize={8}
                fill="rgba(196,186,160,0.2)" style={{pointerEvents:'none'}}>
                {s.nodes?.length||0} nodes{hasCh?' · ◆':''}  {hasJmp?' · →':''}{hasV?' · ▶':''}
              </text>
              {hasCh&&<circle cx={p.x+BOX_W-10} cy={p.y+12} r={4} fill="rgba(232,160,64,0.5)"/>}
              {hasJmp&&<circle cx={p.x+BOX_W-22} cy={p.y+12} r={4} fill="rgba(96,200,200,0.5)"/>}
              {hasV&&<circle cx={p.x+BOX_W-34} cy={p.y+12} r={4} fill="rgba(232,120,240,0.5)"/>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ── Preview Pane ──────────────────────────────────────────────────────────
// Renders the game in a scaled iframe, injecting editor scenes via postMessage
function PreviewPane({ vol, sceneId, scene, lightMode }) {
  const iframeRef = useRef(null);
  const [ready, setReady] = useState(false);
  const [key, setKey] = useState(0);
  const pendingRef = useRef(false);

  const sendScene = useCallback(() => {
    if (!iframeRef.current?.contentWindow) return;
    iframeRef.current.contentWindow.postMessage({
      type: '__mm_preview',
      vol,
      sceneId,
      scene,
    }, '*');
  }, [vol, sceneId, scene]);

  // Listen for ready signal from iframe — retry sendScene on each ready ping
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__mm_preview_ready') {
        setReady(true);
        // Send scene immediately on each ready signal (iframe may signal multiple times)
        setTimeout(sendScene, 50);
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, [sendScene]);

  // Re-send whenever scene changes (if already ready)
  useEffect(() => {
    if (ready) sendScene();
  }, [scene, sceneId, vol, ready, sendScene]);

  const reload = () => { setReady(false); setKey(k => k + 1); };

  // Hide HUD elements that break in preview
  const iframeStyle = {
    position: 'absolute',
    top: 0, left: 0,
    width: 1280, height: 720,
    border: 'none',
    transformOrigin: 'top left',
  };

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#050402',position:'relative'}}>
      {/* Toolbar */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'6px 12px',
        background:'var(--bg1)',borderBottom:'1px solid var(--border2)',flexShrink:0,zIndex:2}}>
        <span style={{fontFamily:'Space Mono',fontSize:9,color:'var(--text3)',flex:1,letterSpacing:'0.1em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {sceneId} · Vol {vol < 10 ? `0${vol}` : vol}
        </span>
        {!ready
          ? <span style={{fontFamily:'Space Mono',fontSize:8,color:'var(--text3)'}}>● Loading…</span>
          : <span style={{fontFamily:'Space Mono',fontSize:8,color:'rgba(80,200,120,0.8)'}}>● Live</span>
        }
        <button onClick={reload} style={{fontFamily:'Space Mono',fontSize:8,letterSpacing:'0.12em',
          textTransform:'uppercase',padding:'3px 10px',border:'1px solid var(--border)',
          background:'var(--accent-bg)',color:'var(--text2)',cursor:'pointer'}}>↺ Reload</button>
        <button onClick={sendScene} style={{fontFamily:'Space Mono',fontSize:8,letterSpacing:'0.12em',
          textTransform:'uppercase',padding:'3px 10px',border:'1px solid var(--border)',
          background:'var(--accent-bg)',color:'var(--accent)',cursor:'pointer'}}>↑ Push scene</button>
      </div>
      {/* Scaled iframe */}
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'#050402'}}>
        <iframe
          key={key}
          ref={iframeRef}
          src={`Modern Mythology.html?preview=1&vol=${vol}&scene=${encodeURIComponent(sceneId)}`}
          style={iframeStyle}
          id="preview-iframe"
          title="Game Preview"
        />
        <PreviewScaler iframeRef={iframeRef} />
      </div>
      <div style={{padding:'5px 12px',background:'var(--bg1)',borderTop:'1px solid var(--border2)',
        fontFamily:'Space Mono',fontSize:8,color:'var(--text3)',display:'flex',gap:16,flexShrink:0}}>
        <span>Click or Space to advance · Choices are interactive</span>
        <span style={{marginLeft:'auto'}}>↑ Push scene to reload with latest node edits</span>
      </div>
    </div>
  );
}

function PreviewScaler({ iframeRef }) {
  const containerRef = useRef(null);
  useEffect(() => {
    const fit = () => {
      const el = containerRef.current?.parentElement;
      if (!el || !iframeRef.current) return;
      const sw = el.clientWidth, sh = el.clientHeight;
      const s = Math.min(sw / 1280, sh / 720);
      iframeRef.current.style.transform = `scale(${s})`;
      iframeRef.current.style.top = `${(sh - 720 * s) / 2}px`;
      iframeRef.current.style.left = `${(sw - 1280 * s) / 2}px`;
    };
    fit();
    const obs = new ResizeObserver(fit);
    if (containerRef.current?.parentElement) obs.observe(containerRef.current.parentElement);
    return () => obs.disconnect();
  }, [iframeRef]);
  return <div ref={containerRef} style={{position:'absolute',inset:0,pointerEvents:'none'}} />;
}

function App() {

    const initial = initData();
    if (Object.keys(initial[7]?.scenes || {}).length) return 7;
    for (let v = 1; v <= 10; v++) {
      if (Object.keys(initial[v]?.scenes || {}).length) return v;
    }
    return 7;
  });
  const [currentSceneId, setCurrentSceneId] = useState(() => {
    const initial = initData();
    const startVol = Object.keys(initial[7]?.scenes || {}).length ? 7 : 1;
    return initial[startVol]?.scenes?.vol7_ch8_six_oclock
      ? 'vol7_ch8_six_oclock'
      : Object.keys(initial[startVol]?.scenes || {})[0] || '';
  });
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [addMenuPos, setAddMenuPos] = useState(null);
  const [showIO, setShowIO] = useState(false);
  const [newCharInput, setNewCharInput] = useState('');
  const [newSceneInput, setNewSceneInput] = useState('');
  const [centerView, setCenterView] = useState('script');
  const [lightMode, setLightMode] = useState(() => localStorage.getItem('mm_editor_theme') === 'light');
  const addMenuRef = useRef();

  // Apply theme class to body AND html
  useEffect(() => {
    document.body.classList.toggle('light', lightMode);
    document.documentElement.classList.toggle('light', lightMode);
    localStorage.setItem('mm_editor_theme', lightMode ? 'light' : 'dark');
  }, [lightMode]);

  const volData = data[currentVol] || { scenes:{} };
  const scene = volData.scenes[currentSceneId];
  const nodes = scene?.nodes || [];

  const allSceneIds = Object.values(data).flatMap(vd => Object.keys(vd.scenes || {}));

  // Persist only scenes the user has actually edited; canonical content stays
  // sourced from vn-scenes.jsx so source-code changes flow through.
  useEffect(() => { persistEditorState(data, editedSet); }, [data, editedSet]);
  useEffect(() => { saveChars(characters); }, [characters]);

  const markEdited = useCallback((id) => {
    setEditedSet(prev => prev.has(id) ? prev : new Set([...prev, id]));
  }, []);
  const resetSceneToCanonical = useCallback((vol, sceneId) => {
    const canonical = buildCanonicalData();
    const cs = canonical[vol]?.scenes?.[sceneId];
    if (!cs) return;
    setData(d => ({ ...d, [vol]: { ...d[vol], scenes: { ...d[vol]?.scenes, [sceneId]: cs } } }));
    setEditedSet(prev => {
      if (!prev.has(sceneId)) return prev;
      const next = new Set(prev); next.delete(sceneId); return next;
    });
  }, []);

  // Close add menu on outside click
  useEffect(() => {
    const h = (e) => { if (addMenuRef.current && !addMenuRef.current.contains(e.target)) setAddMenuPos(null); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const updateScene = useCallback((newScene) => {
    const clean = { ...newScene };
    delete clean.__canonical;
    clean.__edited = true;
    setData(d => ({ ...d, [currentVol]: { ...d[currentVol], scenes: { ...d[currentVol]?.scenes, [currentSceneId]: clean } } }));
    markEdited(currentSceneId);
  }, [currentVol, currentSceneId, markEdited]);

  const updateNodes = useCallback((newNodes) => {
    updateScene({ ...scene, nodes: newNodes });
  }, [scene, updateScene]);

  const addNode = (type, insertAt) => {
    const newNode = { ...DEFAULT_NODES[type] };
    const newNodes = [...nodes.slice(0, insertAt), newNode, ...nodes.slice(insertAt)];
    updateNodes(newNodes);
    setSelectedIdx(insertAt);
    setAddMenuPos(null);
  };

  const deleteNode = (idx) => {
    updateNodes(nodes.filter((_,i)=>i!==idx));
    setSelectedIdx(s => s===idx ? null : s>idx ? s-1 : s);
  };

  const moveNode = (idx, dir) => {
    const ni = idx + dir;
    if (ni < 0 || ni >= nodes.length) return;
    const nn = [...nodes];
    [nn[idx], nn[ni]] = [nn[ni], nn[idx]];
    updateNodes(nn);
    setSelectedIdx(ni);
  };

  const duplicateNode = (idx) => {
    const nn = [...nodes.slice(0, idx+1), { ...nodes[idx] }, ...nodes.slice(idx+1)];
    updateNodes(nn);
    setSelectedIdx(idx+1);
  };

  const updateNode = (idx, newNode) => {
    updateNodes(nodes.map((n,i) => i===idx ? newNode : n));
  };

  const createScene = () => {
    if (!newSceneInput.trim()) return;
    const id = newSceneInput.trim().replace(/\s+/g,'_').toLowerCase();
    setData(d => ({ ...d, [currentVol]: { ...d[currentVol], scenes: { ...d[currentVol]?.scenes, [id]: { id, vol: currentVol, type: 'chapter', title: newSceneInput.trim(), nodes: [], __edited: true } } } }));
    markEdited(id);
    setCurrentSceneId(id);

    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--bg0)'}}>

      }}>

          <button className="btn">← Game</button>
        </a>
        <a href="Asset Manager.html" style={{textDecoration:'none'}}>
          <button className="btn">Assets</button>
        </a>
        <a href="Video Editor.html" style={{textDecoration:'none'}}>
          <button className="btn">Video</button>
        </a>
        <div style={{width:1,height:20,background:'var(--border)'}}></div>
        <span style={{fontFamily:'Cinzel,serif',fontSize:10,letterSpacing:'0.2em',color:'var(--accent)'}}>Scene Editor</span>
        <span style={{fontFamily:'Space Mono',fontSize:9,color:'var(--text3)'}}>—</span>
        <span style={{fontFamily:'Space Mono',fontSize:9,color:'var(--text2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:280}}>{scene?.title || currentSceneId}</span>
        <span style={{fontFamily:'Space Mono',fontSize:8,color:'var(--text3)',whiteSpace:'nowrap'}}>· {nodes.length} nodes</span>
        {scene && (scene.__edited || editedSet.has(currentSceneId)) && (
          <span style={{display:'inline-flex',alignItems:'center',gap:5,fontFamily:'Space Mono',fontSize:8,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--accent)',marginLeft:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)'}}></span>

          )}

                </div>
              );
              // Group by chapter number, preserving narrative order within each group
              const groups = new Map();
              all.forEach(sc => {
                const ch = sc.chapter ?? 0;
                if (!groups.has(ch)) groups.set(ch, []);
                groups.get(ch).push(sc);
              });
              const chapterNums = [...groups.keys()].sort((a,b) => a - b);
              return chapterNums.map(ch => {
                const scenes = groups.get(ch);
                const label = ch === 0 ? 'Front matter / Interludes' : `Chapter ${ch}`;
                return (
                  <div key={ch} style={{marginBottom:10}}>
                    <div style={{fontFamily:'Cinzel,serif',fontSize:8,letterSpacing:'0.22em',color:'var(--text3)',textTransform:'uppercase',padding:'6px 4px 5px',opacity:0.75}}>

                    </div>
                    {scenes.map(sc => {
                      const isEdited = !!sc.__edited || editedSet.has(sc.id);
                      const isCanonical = !!sc.__canonical && !isEdited;
                      const isStub = sc.type==='chapter' && (sc.nodes?.length||0)===0;
                      return (
                        <div key={sc.id}
                          onClick={()=>{setCurrentSceneId(sc.id);setSelectedIdx(null);}}
                          style={{
                            padding:'7px 10px',marginBottom:3,cursor:'pointer',
                            border:`1px solid ${currentSceneId===sc.id?'var(--accent-border)':'var(--border2)'}`,
                            background: currentSceneId===sc.id?'var(--accent-bg)':'transparent',
                            transition:'all 0.12s',
                          }}>
                          <div style={{display:'flex',alignItems:'center',gap:5}}>
                            {sc.type==='interlude' && <span style={{fontSize:9,color:'rgba(240,200,96,0.5)'}}>✦</span>}
                            {isEdited && <span title="Edited locally" style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',flexShrink:0}}></span>}
                            {isStub && <span style={{fontSize:7,color:'var(--text3)',border:'1px solid var(--border2)',padding:'0 3px',letterSpacing:'0.05em',fontFamily:'Space Mono'}}>stub</span>}
                            <div style={{fontFamily:"'Courier Prime',monospace",fontSize:12,color: currentSceneId===sc.id?'var(--text)':sc.type==='interlude'?'rgba(240,200,96,0.6)':'var(--text2)',fontStyle:'italic',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sc.title}</div>
                          </div>
                          <div style={{fontFamily:'Space Mono',fontSize:8,color:'var(--text3)',marginTop:2,display:'flex',gap:6,alignItems:'center'}}>
                            <span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',flex:1}}>{sc.id}</span>
                            <span style={{flexShrink:0}}>{sc.nodes?.length||0}n</span>
                            {isCanonical && <span title="From vn-scenes.jsx" style={{flexShrink:0,opacity:0.55}}>src</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              });
            })()}
          </div>
          {/* New scene */}
          <div style={{padding:'10px 8px',borderTop:'1px solid var(--border2)'}}>
            <div style={{display:'flex',gap:6}}>
              <input value={newSceneInput} onChange={e=>setNewSceneInput(e.target.value)}
                placeholder="Scene title…" style={{flex:1,fontSize:11,height:28,padding:'2px 8px'}}
                onKeyDown={e=>e.key==='Enter'&&createScene()} />
              <button className="btn small" onClick={createScene}>+</button>
            </div>
          </div>
          {/* Characters */}
          <div style={{padding:'8px',borderTop:'1px solid var(--border2)'}}>
            <div className="section-label" style={{marginBottom:6}}>Characters</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {characters.map(c=>(
                <span key={c} style={{
                  fontFamily:'Space Mono',fontSize:8,padding:'2px 6px',
                  border:'1px solid var(--border)',color:'var(--text2)',
                  cursor:'pointer',
                }} title="Click to remove" onClick={()=>setCharacters(ch=>ch.filter(x=>x!==c))}>{c}</span>
              ))}
            </div>
          </div>
        </div>

        {/* Center: script / graph view */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:mainBg}}>
          {/* View toggle header */}
          <div style={{display:'flex',alignItems:'center',padding:'6px 16px',borderBottom:'1px solid var(--border2)',gap:8,flexShrink:0}}>
            {[['script','¶ Script'],['graph','⬡ Graph'],['preview','▶ Preview']].map(([v,lbl])=>(
              <button key={v} onClick={()=>setCenterView(v)} style={{
                padding:'3px 12px',border:`1px solid ${centerView===v?'var(--accent-border)':'var(--border2)'}`,
                background:centerView===v?'var(--accent-bg)':'transparent',
                fontFamily:'Space Mono',fontSize:8,letterSpacing:'.15em',textTransform:'uppercase',
                color:centerView===v?'var(--accent)':'var(--text3)',cursor:'pointer',transition:'all .15s',
              }}>{lbl}</button>
            ))}
            <span style={{flex:1}}></span>
            <span style={{fontFamily:'Space Mono',fontSize:8,color:'var(--text3)'}}>{centerView==='script'?`${nodes.length} nodes`:centerView==='graph'?`${Object.keys(volData.scenes||{}).length} scenes`:'live preview'}</span>
          </div>

          {centerView==='preview' ? (
            <PreviewPane vol={currentVol} sceneId={currentSceneId} scene={scene} lightMode={lightMode} />
          ) : centerView==='graph' ? (
            <SceneGraph scenes={volData.scenes||{}} currentSceneId={currentSceneId}
              onNavigate={id=>{ setCurrentSceneId(id); setSelectedIdx(null); setCenterView('script'); }} />
          ) : <>
            <div style={{flex:1,overflowY:'auto',padding:'20px 24px 80px'}}>
              {nodes.length === 0 && (
                <div style={{textAlign:'center',marginTop:60,color:'var(--text3)',fontFamily:'Space Mono',fontSize:11}}>
                  <div style={{marginBottom:12,fontSize:28}}>¶</div>
                  No nodes yet.<br/>Click the button below to add your first node.
                </div>
              )}
              {nodes.map((node,idx)=>(
                <NodeRow key={idx} node={node} idx={idx}
                  selected={selectedIdx===idx}
                  onSelect={setSelectedIdx}
                  onDelete={deleteNode}
                  onMove={moveNode}
                  onDuplicate={duplicateNode}
                  totalNodes={nodes.length} />
              ))}
            </div>
            {/* Add node button */}
            <div style={{padding:'12px 24px',borderTop:'1px solid var(--border2)',background:mainBg,position:'relative'}}>
              {addMenuPos && (
                <div ref={addMenuRef} style={{position:'absolute',bottom:'100%',left:24}}>
                  <AddNodeMenu onAdd={(t)=>addNode(t, nodes.length)} onClose={()=>setAddMenuPos(null)} />
                </div>
              )}
              <button className="btn accent" style={{width:'100%',justifyContent:'center'}}
                onClick={e=>{setAddMenuPos({y:e.clientY, insertAt:nodes.length});}}>
                + Add Node
              </button>
            </div>
          </>}
        </div>

        {/* Right: node editor */}
        <div style={rightPanelStyle}>
          <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border2)'}}>
            <span className="section-label">Node Properties</span>
            {selectedIdx!==null && (
              <button className="btn small danger" style={{float:'right'}} onClick={()=>deleteNode(selectedIdx)}>Delete</button>
            )}
          </div>
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            {/* Node type selector */}
            {selectedIdx!==null && nodes[selectedIdx] && (
              <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border2)',display:'flex',flexWrap:'wrap',gap:4}}>
                {NODE_TYPES.slice(0,6).map(nt=>(
                  <button key={nt.t}
                    onClick={()=>updateNode(selectedIdx,{...DEFAULT_NODES[nt.t],...(nt.t===nodes[selectedIdx].t?nodes[selectedIdx]:{t:nt.t})})}
                    style={{
                      padding:'3px 8px',border:`1px solid ${nodes[selectedIdx].t===nt.t?nt.color:nt.color+'30'}`,
                      background: nodes[selectedIdx].t===nt.t?`${nt.color}20`:'transparent',
                      color: nodes[selectedIdx].t===nt.t?nt.color:`${nt.color}80`,
                      fontFamily:'Space Mono',fontSize:8,cursor:'pointer',transition:'all 0.12s',
                    }}>{nt.icon} {nt.label}</button>
                ))}
                {NODE_TYPES.slice(6).map(nt=>(
                  <button key={nt.t}
                    onClick={()=>updateNode(selectedIdx,{...DEFAULT_NODES[nt.t],...(nt.t===nodes[selectedIdx].t?nodes[selectedIdx]:{t:nt.t})})}
                    style={{
                      padding:'3px 8px',border:`1px solid ${nodes[selectedIdx].t===nt.t?nt.color:nt.color+'30'}`,
                      background: nodes[selectedIdx].t===nt.t?`${nt.color}20`:'transparent',
                      color: nodes[selectedIdx].t===nt.t?nt.color:`${nt.color}80`,
                      fontFamily:'Space Mono',fontSize:8,cursor:'pointer',transition:'all 0.12s',
                    }}>{nt.icon} {nt.label}</button>
                ))}
              </div>
            )}
            <div style={{flex:1,overflow:'auto'}}>
              <NodeEditor
                node={selectedIdx!==null ? nodes[selectedIdx] : null}
                idx={selectedIdx}
                onUpdate={(n)=>updateNode(selectedIdx, n)}
                onClose={()=>setSelectedIdx(null)}
                characters={characters}
                sceneIds={allSceneIds}
              />
            </div>
          </div>
          {/* Keyboard hints */}
          <div style={{padding:'8px 14px',borderTop:'1px solid var(--border2)',fontFamily:'Space Mono',fontSize:8,color:'var(--text3)',lineHeight:1.8}}>
            Click node to select · ↑↓ to reorder · ⎘ to duplicate
          </div>
        </div>
      </div>

      {showIO && scene && (
        <ImportExportModal
          scene={scene}
          onImport={(nodes)=>updateNodes(nodes)}
          onClose={()=>setShowIO(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
