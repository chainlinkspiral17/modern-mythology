<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TAROT SYNTH · Modern Mythology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ── palette pulled from the gallery cards ────────────────── */
  :root {
    --bg-0:        #050304;
    --bg-1:        #0e0908;
    --ink:         #1a1410;
    --sepia-lo:    #3a2614;
    --sepia-mid:   #8a5a26;
    --sepia-hi:    #d8a060;
    --sepia-peak:  #ffd896;
    --burgundy:    #7a1e26;
    --burgundy-hi: #c8333c;
    --emerald-lo:  #1f4a2a;
    --emerald:     #4ea060;
    --emerald-hi:  #a8e89c;
    --gold:        #d8a060;
    --gold-hi:     #ffd896;
    --rule:        #553318;
    --text:        #c8a878;
    --text-dim:    #7a5828;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-0);
    color: var(--text);
    font-family: "Courier New", "DejaVu Sans Mono", monospace;
    user-select: none;
    overflow: hidden;
    height: 100vh;
  }
  body {
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    grid-template-columns: auto 1fr auto;
    grid-template-areas:
      "header header header"
      "wallL  main   wallR"
      "wallL  seq    wallR"
      "wallL  trans  wallR";
    gap: 4px;
    padding: 8px;
  }
  /* ─── side ASCII wall art ────────────────────────────────── */
  .wall {
    width: 96px;
    background-color: var(--bg-1);
    background-size: contain;
    background-repeat: repeat-y;
    background-position: center top;
    image-rendering: pixelated;
    border: 1px solid var(--rule);
    opacity: 0.65;
  }
  .wall.left  { grid-area: wallL;
                background-image: url("../assets/gallery/ui_ascii_wall_left.png"); }
  .wall.right { grid-area: wallR;
                background-image: url("../assets/gallery/ui_ascii_wall_right.png"); }

  /* ─── header ─────────────────────────────────────────────── */
  header {
    grid-area: header;
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid var(--gold);
    padding: 6px 14px;
    background: linear-gradient(180deg, var(--ink) 0%, var(--bg-1) 100%);
  }
  header h1 {
    margin: 0;
    font-size: 18px; letter-spacing: 0.18em;
    color: var(--gold-hi);
    text-shadow: 1px 1px 0 var(--ink);
  }
  header .status {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
  }
  header .now {
    font-size: 12px;
    color: var(--emerald-hi);
  }

  /* ─── main card grid ─────────────────────────────────────── */
  main {
    grid-area: main;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 4px;
    padding: 4px;
    background: var(--bg-1);
    border: 1px solid var(--rule);
    min-height: 360px;
  }
  .card {
    position: relative;
    background-color: var(--bg-0);
    background-size: cover;
    background-position: center;
    border: 1px solid var(--rule);
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.06s, transform 0.04s;
    image-rendering: pixelated;
  }
  .card:hover  { border-color: var(--gold); }
  .card.pressed {
    border-color: var(--gold-hi);
    transform: scale(0.97);
    box-shadow: 0 0 18px var(--gold);
  }
  .card.locked {
    filter: brightness(0.35) saturate(0.4) hue-rotate(-20deg);
    cursor: not-allowed;
  }
  .card .num {
    position: absolute; top: 4px; left: 4px;
    font-size: 11px; font-weight: bold;
    color: var(--gold-hi);
    text-shadow: 1px 1px 0 var(--ink);
  }
  .card .name {
    position: absolute; bottom: 2px; left: 0; right: 0;
    font-size: 9px; letter-spacing: 0.06em;
    text-align: center;
    color: var(--text);
    background: rgba(0, 0, 0, 0.55);
    padding: 2px 0;
    text-transform: uppercase;
  }
  .card .key {
    position: absolute; top: 4px; right: 4px;
    font-size: 9px;
    color: var(--emerald-hi);
    background: rgba(0, 0, 0, 0.55);
    padding: 1px 4px;
  }
  /* per-row palette accents */
  .card.row-0 { box-shadow: inset 0 -2px 0 var(--sepia-mid); }
  .card.row-1 { box-shadow: inset 0 -2px 0 var(--burgundy); }
  .card.row-2 { box-shadow: inset 0 -2px 0 var(--emerald); }

  /* ─── 16-step sequencer ──────────────────────────────────── */
  .seq {
    grid-area: seq;
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 4px;
    padding: 4px;
    background: var(--bg-1);
    border: 1px solid var(--rule);
  }
  .seq .lanes {
    display: grid;
    grid-template-rows: repeat(4, 1fr);
    gap: 2px;
  }
  .seq .lane-label {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg-0);
    border: 1px solid var(--rule);
  }
  .lane {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 2px;
  }
  .step {
    background: var(--bg-0);
    border: 1px solid var(--rule);
    cursor: pointer;
    min-height: 22px;
    position: relative;
  }
  .step:hover { border-color: var(--gold); }
  .step.on   { background: var(--sepia-mid); border-color: var(--gold-hi); }
  .step.beat { border-left: 2px solid var(--text-dim); }
  .step.cursor::after {
    content: ""; position: absolute;
    inset: 0;
    background: rgba(255, 216, 150, 0.35);
    animation: cursorFlash 0.18s linear;
  }
  .step .card-mini {
    width: 100%; height: 100%;
    background-size: cover; background-position: center;
    opacity: 0.5;
    image-rendering: pixelated;
    pointer-events: none;
  }
  @keyframes cursorFlash {
    from { opacity: 1; } to { opacity: 0; }
  }

  /* ─── transport ──────────────────────────────────────────── */
  .transport {
    grid-area: trans;
    display: flex; gap: 8px; align-items: center;
    padding: 6px 10px;
    background: var(--bg-1);
    border: 1px solid var(--rule);
    font-size: 11px;
  }
  .transport button {
    background: var(--ink);
    color: var(--gold-hi);
    border: 1px solid var(--rule);
    padding: 4px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .transport button:hover { border-color: var(--gold-hi); }
  .transport button.active { background: var(--burgundy); color: var(--gold-hi); }
  .transport .group {
    display: flex; gap: 4px; align-items: center;
    border-left: 1px solid var(--rule);
    padding-left: 10px;
    margin-left: 4px;
  }
  .transport label { color: var(--text-dim); font-size: 10px; }
  .transport input[type=range] {
    width: 90px; accent-color: var(--gold-hi);
  }
  .transport select {
    background: var(--ink); color: var(--gold-hi);
    border: 1px solid var(--rule);
    padding: 3px 6px;
    font-family: inherit; font-size: 11px;
  }

  /* drag-drop overlay for swapping art */
  .drop-hint {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    color: var(--gold-hi);
    display: none; align-items: center; justify-content: center;
    font-size: 24px; letter-spacing: 0.2em;
    pointer-events: none;
    z-index: 100;
  }
  .drop-hint.show { display: flex; }

  /* bank tabs */
  .bank-row {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .bank-tab {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--rule);
    padding: 3px 10px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.12em;
    cursor: pointer;
  }
  .bank-tab:hover { color: var(--gold-hi); border-color: var(--gold); }
  .bank-tab.active {
    background: var(--sepia-lo);
    color: var(--gold-hi);
    border-color: var(--gold);
  }
  .bank-sub {
    flex: 1;
    margin-left: 14px;
    color: var(--text-dim);
    font-size: 11px;
    font-style: italic;
  }
</style>
</head>
<body>
  <header>
    <h1>TAROT SYNTH · <span id="bank-name">DINER</span></h1>
    <div class="bank-row" id="bank-row">
      <button class="bank-tab active" data-bank="diner">DINER</button>
      <button class="bank-tab"        data-bank="cathedral">CATHEDRAL</button>
      <button class="bank-tab"        data-bank="riverboat">RIVERBOAT</button>
      <button class="bank-tab"        data-bank="pastoral">PASTORAL</button>
      <div class="bank-sub" id="bank-sub">vol 5 · ch 0 · D'Ambrosio's · the Fool</div>
    </div>
    <div class="now" id="now-playing">—</div>
    <div class="status" id="status">[ click a card · type 1-y · drop PNG onto card · switch banks above ]</div>
  </header>

  <div class="wall left"></div>
  <div class="wall right"></div>

  <main id="grid"></main>

  <div class="seq">
    <div class="lanes">
      <div class="lane-label">LANE 1</div>
      <div class="lane-label">LANE 2</div>
      <div class="lane-label">LANE 3</div>
      <div class="lane-label">LANE 4</div>
    </div>
    <div class="lanes" id="seq-lanes"></div>
  </div>

  <div class="transport">
    <button id="play">▶ PLAY</button>
    <button id="stop">■ STOP</button>
    <button id="clear">⌫ CLEAR</button>
    <button id="chord-mode" title="When on: gamepad frets accumulate into a held chord, strum plays it.">♪ CHORD: OFF</button>
    <div class="group">
      <label>BPM</label>
      <input type="range" id="bpm" min="40" max="200" value="92">
      <span id="bpm-val">92</span>
    </div>
    <div class="group">
      <label>SCALE</label>
      <select id="scale">
        <option value="phrygian"  selected>phrygian</option>
        <option value="dorian">dorian</option>
        <option value="locrian">locrian</option>
        <option value="aeolian">aeolian (minor)</option>
        <option value="harmonic">harmonic minor</option>
      </select>
    </div>
    <div class="group">
      <label>ROOT</label>
      <select id="root">
        <option value="33" selected>A1</option>
        <option value="38">D2</option>
        <option value="40">E2</option>
        <option value="45">A2</option>
      </select>
    </div>
    <div class="group">
      <label>VOL</label>
      <input type="range" id="vol" min="0" max="100" value="60">
    </div>
    <div class="group" style="margin-left: auto;">
      <span style="color: var(--text-dim);">step</span>
      <span id="step-display" style="color: var(--gold-hi);">— / 16</span>
    </div>
  </div>

  <div class="drop-hint" id="drop-hint">DROP PNG ON A CARD TO SWAP</div>

<script src="gamepad_input.js"></script>

let activeBank = 'diner';
function activeArcana()   { return BANKS[activeBank].arcana; }
function activePresets()  { return PRESETS_BY_BANK[activeBank] || PRESETS_BY_BANK.diner; }

// ── Scales (intervals from root) ─────────────────────────────────
const SCALES = {
  phrygian:  [0, 1, 3, 5, 7, 8, 10],
  dorian:    [0, 2, 3, 5, 7, 9, 10],
  locrian:   [0, 1, 3, 5, 6, 8, 10],
  aeolian:   [0, 2, 3, 5, 7, 8, 10],
  harmonic:  [0, 2, 3, 5, 7, 8, 11],
};

// ── Web Audio ─────────────────────────────────────────────────────
let ac;
let masterGain;
function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ac.createGain();
  masterGain.gain.value = 0.6;
  masterGain.connect(ac.destination);
}

function scaleSnap(semi) {
  // snap a raw semitone offset to the current scale
  const scale = SCALES[document.getElementById('scale').value];
  const oct = Math.floor(semi / 12);
  let inOct = semi - oct * 12;
  // find nearest scale degree
  let best = scale[0], bestD = Infinity;
  for (const s of scale) {
    const d = Math.abs(s - inOct);
    if (d < bestD) { bestD = d; best = s; }
  }
  return oct * 12 + best;
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

// Per-timbre voice — small but distinct waveform + envelope combos
function trigger(timbre, midi, vel=0.7) {
  initAudio();
  if (ac.state === "suspended") ac.resume();
  const now = ac.currentTime;
  const freq = midiToFreq(midi);

  const env = ac.createGain();
  env.gain.value = 0;
  env.connect(masterGain);

  // shared chain components
  const filter = ac.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 3600;
  filter.Q.value = 1.2;
  filter.connect(env);

  const p = activePresets()[timbre] || PRESETS_BY_BANK.diner.pulse_soft;

  filter.frequency.value = p.filt;

  if (p.drive) {
    const shaper = ac.createWaveShaper();
    shaper.curve = (function(){
      const c = new Float32Array(1024);
      for (let i = 0; i < 1024; i++) {
        const x = (i / 1024) * 2 - 1;
        c[i] = Math.tanh(x * 2.5);
      }
      return c;
    })();
    shaper.connect(filter);
    filter.disconnect();
    shaper.connect(env);
    filter.connect = (() => shaper)();
  }

  // Voice spawning
  const baseMidi = midi + (p.transpose || 0);
  const voices = p.voices || 1;
  const harmonics = p.harmonic || [1];
  const arpNotes = p.arp || [0];
  const arpStep = 0.08;

  arpNotes.forEach((semi, arpIdx) => {
    const arpDelay = arpIdx * arpStep;
    harmonics.forEach((mul, hIdx) => {
      for (let v = 0; v < voices; v++) {
        let osc;
        if (p.wave === "noise") {
          const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.6;
          osc = ac.createBufferSource();
          osc.buffer = buf;
        } else {
          osc = ac.createOscillator();
          osc.type = p.wave;
          osc.frequency.value = midiToFreq(baseMidi + semi) * mul;
        }
        if (osc.detune && p.detune) {
          osc.detune.value = (v - (voices - 1) / 2) * p.detune;
        }
        if (p.vibrato && osc.frequency) {
          const lfo = ac.createOscillator();
          lfo.frequency.value = 5.5;
          const lfoG = ac.createGain();
          lfoG.gain.value = p.vibrato;
          lfo.connect(lfoG); lfoG.connect(osc.frequency);
          lfo.start(now + arpDelay);
          lfo.stop(now + arpDelay + p.dur + 0.2);
        }
        const start = now + arpDelay;
        osc.connect(filter);
        osc.start(start);
        osc.stop(start + p.dur + p.rel + 0.05);
      }
    });
  });

  // ADSR on env
  env.gain.cancelScheduledValues(now);
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(vel,            now + p.atk);
  env.gain.linearRampToValueAtTime(vel * p.sus,    now + p.atk + p.dec);
  env.gain.setValueAtTime(vel * p.sus,             now + p.dur);
  env.gain.linearRampToValueAtTime(0,              now + p.dur + p.rel);
}

// ── Build card grid ───────────────────────────────────────────────
const grid = document.getElementById('grid');
function buildGrid() {
  grid.innerHTML = '';
  activeArcana().forEach(([num, name, art, key, timbre, semi], idx) => {
    const card = document.createElement('div');
    card.className = 'card row-' + (Math.floor(idx / 8) % 3);
    card.dataset.idx = idx;
    if (art) {
      card.style.backgroundImage = `url("../assets/gallery/${art}")`;
    } else {
      card.classList.add('locked');
    }
    card.innerHTML = `
      <span class="num">${num.toString().padStart(2,'0')}</span>
      <span class="key">${key.toUpperCase()}</span>
      <span class="name">${name}</span>
      <span class="timbre" style="position:absolute;bottom:4px;left:4px;font-size:9px;color:var(--text-dim);background:rgba(0,0,0,0.55);padding:1px 4px;">${timbre}</span>
    `;
    card.addEventListener('mousedown', () => playCard(idx));
    card.addEventListener('dragover',  e => { e.preventDefault(); card.style.opacity = 0.6; });
    card.addEventListener('dragleave', () => card.style.opacity = 1);
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.style.opacity = 1;
      const f = e.dataTransfer.files[0];
      if (!f || !f.type.startsWith('image/')) return;
      const r = new FileReader();
      r.onload = ev => {
        card.style.backgroundImage = `url("${ev.target.result}")`;
        card.classList.remove('locked');
      };
      r.readAsDataURL(f);
    });
    grid.appendChild(card);
  });
  // 2 blank padding cells to fill the 4x6=24 grid
  for (let i = 0; i < 2; i++) {
    const blank = document.createElement('div');
    blank.className = 'card locked';
    blank.style.background = 'var(--bg-0)';
    blank.innerHTML = '<span class="name" style="background:transparent;color:var(--text-dim)">—</span>';
    grid.appendChild(blank);
  }
}
buildGrid();

// ── Build sequencer ───────────────────────────────────────────────
const seqLanes = document.getElementById('seq-lanes');
const SEQ_LANES = 4;
const SEQ_STEPS = 16;
const pattern = Array.from({length: SEQ_LANES}, () =>
  Array(SEQ_STEPS).fill(null));

for (let L = 0; L < SEQ_LANES; L++) {
  const lane = document.createElement('div');
  lane.className = 'lane';
  for (let s = 0; s < SEQ_STEPS; s++) {
    const step = document.createElement('div');
    step.className = 'step' + (s % 4 === 0 ? ' beat' : '');
    step.dataset.lane = L;
    step.dataset.step = s;
    step.addEventListener('click', () => toggleStep(L, s));
    lane.appendChild(step);
  }
  seqLanes.appendChild(lane);
}

let selectedCard = 4;   // default to Emperor as the "active selection"
function toggleStep(L, s) {
  if (pattern[L][s] === null) {
    pattern[L][s] = selectedCard;
    const stepEl = seqLanes.children[L].children[s];
    stepEl.classList.add('on');
    stepEl.innerHTML = '';
    const mini = document.createElement('div');
    mini.className = 'card-mini';
    const art = activeArcana()[selectedCard][2];
    if (art) mini.style.backgroundImage = `url("../assets/gallery/${art}")`;
    stepEl.appendChild(mini);
  } else {
    pattern[L][s] = null;
    const stepEl = seqLanes.children[L].children[s];
    stepEl.classList.remove('on');
    stepEl.innerHTML = '';
  }
}

// ── Play / trigger ────────────────────────────────────────────────
function playCard(idx) {
  const card = grid.children[idx];
  if (!card || card.classList.contains('locked')) return;
  const [num, name, art, key, timbre, semi] = activeArcana()[idx];
  const root = parseInt(document.getElementById('root').value);
  const midi = scaleSnap(root + semi);
  const vel  = parseInt(document.getElementById('vol').value) / 100;
  trigger(timbre, midi, vel);
  selectedCard = idx;
  // visual feedback
  card.classList.add('pressed');
  setTimeout(() => card.classList.remove('pressed'), 90);
  document.getElementById('now-playing').textContent =
    `▶ ${num.toString().padStart(2,'0')} · ${name} · ${timbre}`;
}

// ── Transport ─────────────────────────────────────────────────────
let playing = false;
let curStep = 0;
let stepInterval = null;
const playBtn = document.getElementById('play');
const stopBtn = document.getElementById('stop');
const clearBtn = document.getElementById('clear');
const bpmEl = document.getElementById('bpm');
const bpmVal = document.getElementById('bpm-val');
const stepDisp = document.getElementById('step-display');
bpmEl.addEventListener('input', () => { bpmVal.textContent = bpmEl.value; restartLoop(); });

function tick() {
  // clear previous cursor
  document.querySelectorAll('.step.cursor').forEach(s => s.classList.remove('cursor'));
  for (let L = 0; L < SEQ_LANES; L++) {
    const stepEl = seqLanes.children[L].children[curStep];
    stepEl.classList.add('cursor');
    const cardIdx = pattern[L][curStep];
    if (cardIdx !== null) {
      const [num, name, art, key, timbre, semi] = activeArcana()[cardIdx];
      const root = parseInt(document.getElementById('root').value);
      const midi = scaleSnap(root + semi);
      trigger(timbre, midi, 0.7);
    }
  }
  stepDisp.textContent = `${(curStep + 1).toString().padStart(2,'0')} / 16`;
  curStep = (curStep + 1) % SEQ_STEPS;
}

function startLoop() {
  playing = true;
  playBtn.classList.add('active');
  const bpm = parseInt(bpmEl.value);
  const interval = 60000 / bpm / 4;  // 16th notes
  if (stepInterval) clearInterval(stepInterval);
  stepInterval = setInterval(tick, interval);
}
function stopLoop() {
  playing = false;
  playBtn.classList.remove('active');
  if (stepInterval) clearInterval(stepInterval);
  stepInterval = null;
  curStep = 0;
  document.querySelectorAll('.step.cursor').forEach(s => s.classList.remove('cursor'));
  stepDisp.textContent = '— / 16';
}
function restartLoop() {
  if (playing) { stopLoop(); startLoop(); }
}

playBtn.addEventListener('click', () => playing ? stopLoop() : startLoop());
stopBtn.addEventListener('click', stopLoop);
clearBtn.addEventListener('click', () => {
  for (let L = 0; L < SEQ_LANES; L++) {
    for (let s = 0; s < SEQ_STEPS; s++) {
      pattern[L][s] = null;
      const e = seqLanes.children[L].children[s];
      e.classList.remove('on');
      e.innerHTML = '';
    }
  }
});

// ── Master volume ─────────────────────────────────────────────────
document.getElementById('vol').addEventListener('input', e => {
  if (masterGain) masterGain.gain.value = parseInt(e.target.value) / 100;
});

// ── Keyboard ──────────────────────────────────────────────────────
let keyMap = new Map(activeArcana().map(([n,name,a,k], i) => [k, i]));
function rebuildKeyMap() {
  keyMap = new Map(activeArcana().map(([n,name,a,k], i) => [k, i]));
}
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ') { e.preventDefault(); playing ? stopLoop() : startLoop(); return; }
  const idx = keyMap.get(e.key.toLowerCase());
  if (idx !== undefined) {
    e.preventDefault();
    playCard(idx);
  }
});

// ── Bank switching ────────────────────────────────────────────────
// Switching banks re-voices the 22 cards and rebuilds the grid + key
// map. The sequencer pattern stays — it indexes by card slot 0-21,
// so the same steps now play through the new bank's timbres.
function switchBank(id) {
  if (!BANKS[id]) return;
  activeBank = id;
  document.querySelectorAll('.bank-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.bank === id);
  });
  document.getElementById('bank-name').textContent = BANKS[id].name;
  document.getElementById('bank-sub').textContent  = BANKS[id].sub;
  buildGrid();
  rebuildKeyMap();
  // Re-render any active sequencer steps with the new bank's art.
  for (let L = 0; L < SEQ_LANES; L++) {
    for (let s = 0; s < SEQ_STEPS; s++) {
      const cardIdx = pattern[L][s];
      const stepEl = seqLanes.children[L].children[s];
      if (cardIdx === null) continue;
      stepEl.innerHTML = '';
      const mini = document.createElement('div');
      mini.className = 'card-mini';
      const art = activeArcana()[cardIdx][2];
      if (art) mini.style.backgroundImage = `url("../assets/gallery/${art}")`;
      stepEl.appendChild(mini);
    }
  }
  // Chord status (if chord mode is on) reads its degree labels from
  // the new bank's set.
  if (typeof refreshChordStatus === 'function') refreshChordStatus();
}
document.querySelectorAll('.bank-tab').forEach(btn => {
  btn.addEventListener('click', () => switchBank(btn.dataset.bank));
});

// ── Drag-drop hint ────────────────────────────────────────────────
window.addEventListener('dragenter', e => {
  if (e.dataTransfer && e.dataTransfer.types.includes('Files')) {
    document.getElementById('drop-hint').classList.add('show');
  }
});
window.addEventListener('dragleave', e => {
  if (!e.relatedTarget) document.getElementById('drop-hint').classList.remove('show');
});
window.addEventListener('drop', e => {
  document.getElementById('drop-hint').classList.remove('show');
});

// suspend AudioContext until first user gesture
document.body.addEventListener('click', () => { initAudio(); if (ac && ac.state==='suspended') ac.resume(); }, {once:true});

// ── Riffmaster / gamepad input ────────────────────────────────────
// Two modes:
//   single-fret (default) — each fret press triggers the active-bank
//                           card 0-4 (and solo frets 5-9); strum
//                           cycles banks.
//   chord            — frets accumulate into heldFrets while pressed;
//                      strum plays each held fret's scale degree at
//                      the bank's chord-pad timbre, forming a real
//                      voicing. Each bank has its own degree set so
//                      Diner reads as maj7+9, Cathedral as min7+♭9,
//                      Riverboat as maj6+9, Pastoral as sus2+6+9.
const gp = new GamepadInput();
gp.start();
mountGamepadOverlay(gp);
// Riffmaster strum is reported as a momentary axis swing on most
// Windows drivers; this bridges it to synthetic strumUp/strumDown
// button events so chord-mode strum + bank-cycling-strum both work.
bindStrumAxis(gp, gp.mapping.strumAxis);
const BANK_ORDER = ['diner', 'cathedral', 'riverboat', 'pastoral'];

// Scale degrees (semitones from root) assigned to frets 1-5 per bank.
// Solo frets (6-10) layer the same degrees one octave up.
const BANK_CHORD_DEGREES = {
  diner:     [0, 4, 7, 10, 14],    // maj7 + 9, warm/blues
  cathedral: [0, 3, 7, 10, 13],    // min7 + ♭9, rust-noir
  riverboat: [0, 4, 7, 9,  14],    // maj6 + 9, brass-open
  pastoral:  [0, 2, 7, 9,  14],    // sus2 + 6 + 9, pastoral
};
const BANK_CHORD_TIMBRES = {
  diner:     'rich_pad',
  cathedral: 'full_moon_drone',
  riverboat: 'green_pad',
  pastoral:  'pastoral_drone',
};

let chordMode = false;
const heldFrets = new Set();   // values 0..9 (0-4 main, 5-9 solo octave up)

const chordBtn = document.getElementById('chord-mode');
function setChordMode(on) {
  chordMode = on;
  chordBtn.textContent = '♪ CHORD: ' + (on ? 'ON' : 'OFF');
  chordBtn.classList.toggle('active', on);
  heldFrets.clear();
  refreshChordStatus();
}
chordBtn.addEventListener('click', () => setChordMode(!chordMode));

function refreshChordStatus() {
  if (!chordMode) {
    document.getElementById('status').textContent =
      '[ click a card · type 1-y · drop PNG onto card · switch banks above ]';
    return;
  }
  const degrees = BANK_CHORD_DEGREES[activeBank] || BANK_CHORD_DEGREES.diner;
  if (heldFrets.size === 0) {
    document.getElementById('status').textContent = '[ chord mode · hold frets · strum to play ]';
    return;
  }
  const semitones = [...heldFrets].sort((a,b)=>a-b).map(i => {
    const base = degrees[i % 5];
    return (i >= 5) ? base + 12 : base;
  });
  document.getElementById('status').textContent = '[ chord: ' + semitones.join(' / ') + ' semis above root ]';
}

function strumChord() {
  if (heldFrets.size === 0) return;
  const root = parseInt(document.getElementById('root').value);
  const degrees = BANK_CHORD_DEGREES[activeBank] || BANK_CHORD_DEGREES.diner;
  const timbre  = BANK_CHORD_TIMBRES[activeBank] || 'rich_pad';
  const vol = parseInt(document.getElementById('vol').value) / 100;
  // Per-voice velocity scaled so big stacked chords don't clip.
  const voiceVel = vol / Math.max(1.0, Math.sqrt(heldFrets.size));
  for (const fretIdx of heldFrets) {
    let deg = degrees[fretIdx % 5];
    if (fretIdx >= 5) deg += 12;
    const midi = scaleSnap(root + deg);
    trigger(timbre, midi, voiceVel);
  }
}

window.addEventListener('gamepadinput-connected', () => {
  initAudio();
  if (ac && ac.state === 'suspended') ac.resume();
});
window.addEventListener('gamepadinput-button', e => {
  initAudio();
  if (ac && ac.state === 'suspended') ac.resume();
  const m = gp.mapping;
  const fretIdx  = m.frets.indexOf(e.detail.idx);
  const soloIdx  = m.soloFrets.indexOf(e.detail.idx);
  const anyFret  = (fretIdx >= 0) ? fretIdx : (soloIdx >= 0 ? soloIdx + 5 : -1);
  const isStrum  = (e.detail.idx === m.strumUp || e.detail.idx === m.strumDown);

  if (chordMode) {
    // Frets accumulate/release; strum plays the held chord.
    if (anyFret >= 0) {
      if (e.detail.pressed) heldFrets.add(anyFret);
      else heldFrets.delete(anyFret);
      refreshChordStatus();
      return;
    }
    if (isStrum && e.detail.pressed) {
      strumChord();
    }
    return;
  }

  // Single-fret mode (original behavior). Only act on press edges.
  if (!e.detail.pressed) return;
  if (fretIdx >= 0 && fretIdx < activeArcana().length) {
    playCard(fretIdx);
    return;
  }
  if (soloIdx >= 0 && (soloIdx + 5) < activeArcana().length) {
    playCard(soloIdx + 5);
    return;
  }
  if (isStrum) {
    const cur = BANK_ORDER.indexOf(activeBank);
    const next = e.detail.idx === m.strumDown
      ? (cur + 1) % BANK_ORDER.length
      : (cur - 1 + BANK_ORDER.length) % BANK_ORDER.length;
    switchBank(BANK_ORDER[next]);
  }
});
window.addEventListener('gamepadinput-axis', e => {
  if (e.detail.idx === gp.mapping.whammy) {
    const v = Math.abs(e.detail.value);
    const pct = Math.min(100, Math.max(30, 30 + Math.floor(v * 70)));
    document.getElementById('vol').value = pct;
    if (masterGain) masterGain.gain.value = pct / 100;
  }
});
</script>
</body>
</html>
