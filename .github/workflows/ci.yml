name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-data:
    name: Validate scene data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check all JSON files parse
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          bad = 0
          for p in sorted(Path(".").rglob("*.json")):
              if ".git" in p.parts:
                  continue
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except json.JSONDecodeError as e:
                  print(f"::error file={p}::JSON parse error: {e}")
                  bad += 1
          print(f"Checked JSON files; {bad} invalid.")
          sys.exit(1 if bad else 0)
          PY

      - name: Validate scene data contract
        working-directory: godot
        run: python3 tools/validate_scenes.py
